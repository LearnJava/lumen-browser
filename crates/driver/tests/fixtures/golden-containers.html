<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: content-box; }
  body { margin: 0; }
  .outer { width: 300px; padding: 10px; border: 2px solid black; }
  .inner-a { width: 100px; height: 50px; }
  .flex-row { display: flex; width: 300px; gap: 10px; }
  .flex-item { width: 60px; height: 40px; }
</style>
</head>
<body>
  <div class="outer">
    <div class="inner-a"></div>
    <div class="flex-row">
      <div class="flex-item item-a"></div>
      <div class="flex-item item-b"></div>
    </div>
  </div>
</body>
</html>
