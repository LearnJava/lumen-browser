# BUG-310 landed `children` as a live HTMLCollection with `item`/`namedItem`, but
# these two subtests stay FAIL by design — genuine engine gaps, not weakened.
# Subtest names corrected 2026-07-20: this file has no `test(fn, name)` calls, so
# testharness.js names each unnamed test from `document.title` ("HTMLCollection
# edge cases" / "HTMLCollection edge cases 1"), NOT from the filename — the
# previous `.ini` pinned the wrong names (`Element-children`/`Element-children 1`),
# so neither ever matched a real result and the gate showed unexpected FAIL
# instead of a recognized, tracked expectation.
#
# "HTMLCollection edge cases": `children.item("foo")` — the string arg is
# ToUint32-coerced to 0 per WebIDL (`item(unsigned long)`), so this asserts
# `item(0) instanceof Element`, which fails because no native element wrapper
# has a `[[Prototype]]` set at all — tracked as BUG-322 (`instanceof` broken for
# every element, not HTMLCollection-specific).
#
# "HTMLCollection edge cases 1": asserts `for-in`/`Object.getOwnPropertyNames`
# enumeration of the live HTMLCollection (indices + visible id/name keys) —
# tracked as BUG-323 (the Proxy has no `ownKeys`/`getOwnPropertyDescriptor`
# traps). Also asserts `list[name] instanceof Element` later in the same
# subtest, which additionally depends on BUG-322.
[Element-children.html]
  [HTMLCollection edge cases]
    expected: FAIL
  [HTMLCollection edge cases 1]
    expected: FAIL
