name: Release

# Builds release binaries for Linux/macOS/Windows and creates a GitHub Release.
# Triggered by pushing a version tag: git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: lumen-linux-x86_64
            archive-ext: tar.gz
            exe-suffix: ''

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: lumen-macos-aarch64
            archive-ext: tar.gz
            exe-suffix: ''

          - os: macos-13
            target: x86_64-apple-darwin
            artifact-name: lumen-macos-x86_64
            archive-ext: tar.gz
            exe-suffix: ''

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: lumen-windows-x86_64
            archive-ext: zip
            exe-suffix: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      # glutin (OpenGL context) and winit need X11/Wayland/EGL headers on Linux.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgles2-mesa-dev \
            pkg-config

      # Build both binaries in one pass to share compilation of common crates.
      - name: Build release binaries
        run: >
          cargo build --release
          --target ${{ matrix.target }}
          -p lumen-shell
          -p lumen-network

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/lumen${{ matrix.exe-suffix }}" staging/
          cp "target/${{ matrix.target }}/release/lumen-network-service${{ matrix.exe-suffix }}" staging/

      - name: Resolve version string
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCHIVE="${{ matrix.artifact-name }}-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCHIVE="${{ matrix.artifact-name }}-${VERSION}.zip"
          cd staging && 7z a "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # needed to create the release and upload assets

    steps:
      - name: Resolve version string
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            lumen-linux-x86_64/*
            lumen-macos-aarch64/*
            lumen-macos-x86_64/*
            lumen-windows-x86_64/*
