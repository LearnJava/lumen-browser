name: CI

# Cross-platform compilation check + unit tests on every push/PR to main.
# Graphic tests (gdigrab + Edge comparison) are Windows-only and run separately.

on:
  push:
    branches: [main]
    tags-ignore: ['**']   # release.yml handles tags
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      # glutin (OpenGL context) and winit need X11/Wayland/EGL headers on Linux.
      # rusqlite uses "bundled" so no libsqlite3 required.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgles2-mesa-dev \
            pkg-config

      # Verify the main shell binary compiles on all platforms.
      # This catches cross-platform breakage early without waiting for a full release build.
      - name: Compile check (lumen-shell)
        run: cargo check -p lumen-shell

      # Run unit tests for crates that have no windowing/GPU requirements.
      # lumen-shell and lumen-paint (with GPU backends) are excluded here.
      - name: Unit tests — core + parsers
        run: |
          cargo test -p lumen-core
          cargo test -p lumen-html-parser
          cargo test -p lumen-css-parser
          cargo test -p lumen-dom

      - name: Unit tests — engine
        run: |
          cargo test -p lumen-layout
          cargo test -p lumen-font
          cargo test -p lumen-encoding
          cargo test -p lumen-image

      - name: Unit tests — services
        run: |
          cargo test -p lumen-js
          cargo test -p lumen-network
          cargo test -p lumen-storage
          cargo test -p lumen-ipc
          cargo test -p lumen-knowledge
