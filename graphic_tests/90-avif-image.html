<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST-90: AVIF Image Display</title>
    <style>
        body {
            background: #ff00ff;
            width: 1024px;
            height: 720px;
            margin: 0;
            padding: 0;
        }
        .__f {
            background: white;
            width: 1022px;
            height: 718px;
            margin: 1px;
            padding: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .cell {
            flex: 1;
            display: flex;
            gap: 20px;
        }
        .cell-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f9f9f9;
        }
        .cell-item img,
        .cell-item picture {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
        }
        .label {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="__f">
        <!-- Row 1: AVIF solid colors -->
        <div class="cell">
            <div class="cell-item">
                <!-- Red square AVIF -->
                <picture>
                    <source type="image/avif" srcset="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAG1pZjEAAACrcmF3bAAAAGn/4JDsRQAA">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAHklEQVR42mP8z8BQz0AEYBxVSIqKYdQ6UkBqHSmgJgCzR8/HfUkLvQAAAABJRU5ErkJggg==" alt="Red">
                </picture>
                <div class="label">Red AVIF</div>
            </div>
            <div class="cell-item">
                <!-- Green square AVIF -->
                <picture>
                    <source type="image/avif" srcset="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAG1pZjEAAACrcmF3bAAAAGn/4JDsRQAA">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAHklEQVR42mNgGAWjYBSMglEwCkbBKBgFo2AUjAIAeAAPW8Z9+voAAAAASUVORK5CYII=" alt="Green">
                </picture>
                <div class="label">Green AVIF</div>
            </div>
            <div class="cell-item">
                <!-- Blue square AVIF -->
                <picture>
                    <source type="image/avif" srcset="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAG1pZjEAAACrcmF3bAAAAGn/4JDsRQAA">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAHklEQVR42mNgYGD4z8DAwMjIyMDAyMjAwMjAwMAIAADzVAB/I7XnNQAAAABJRU5ErkJggg==" alt="Blue">
                </picture>
                <div class="label">Blue AVIF</div>
            </div>
        </div>

        <!-- Row 2: AVIF with fallback -->
        <div class="cell">
            <div class="cell-item">
                <!-- AVIF with WebP fallback -->
                <picture>
                    <source type="image/avif" srcset="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAG1pZjEAAACrcmF3bAAAAGn/4JDsRQAA">
                    <source type="image/webp" srcset="data:image/webp;base64,UklGRiYAAABXRUJQVlA4IBIAAAAwAQCdASoBAAEAAUAcJaACdLoBAAEA">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAHklEQVR42mNgYGD4z8DAwMjIyMDAyMjAwMjAwMAIAADzVAB/I7XnNQAAAABJRU5ErkJggg==" alt="Multi-format">
                </picture>
                <div class="label">AVIF → WebP → PNG</div>
            </div>
            <div class="cell-item">
                <!-- Direct AVIF image tag -->
                <img src="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAG1pZjEAAACrcmF3bAAAAGn/4JDsRQAA" alt="Direct AVIF">
                <div class="label">Direct &lt;img&gt; AVIF</div>
            </div>
            <div class="cell-item">
                <!-- AVIF with size info -->
                <picture>
                    <source type="image/avif" srcset="data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAG1pZjEAAACrcmF3bAAAAGn/4JDsRQAA">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAHklEQVR42mNkYGD4z8DAwMjIyMDAyMjAwMjAwMAIAADzVAB/I7XnNQAAAABJRU5ErkJggg==" alt="Sized">
                </picture>
                <div class="label">AVIF with Sizes</div>
            </div>
        </div>
    </div>
</body>
</html>
