<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lumen — 50 css variables</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
    .__f { background: #1a202c; width: 1022px; height: 718px; margin: 1px; padding: 20px; overflow: hidden; }

    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .sep { height: 12px; }

    /* reference bar (plain color, no var) */
    .ref  { height: 30px; background: #718096; }
    /* test bar must visually match its ref counterpart */
    .bar  { height: 30px; }

    /* group 1: basic var() — color from custom property */
    .g1-ref1 { background: #e53e3e; }
    .g1-t1   { --c: #e53e3e; background: var(--c); }
    .g1-ref2 { background: #3182ce; }
    .g1-t2   { --c: #3182ce; background: var(--c); }
    .g1-ref3 { background: #38a169; }
    .g1-t3   { --c: #38a169; background: var(--c); }

    /* group 2: nested var() — --a: var(--b) */
    .g2-ref1 { background: #d69e2e; }
    .g2-t1   { --b: #d69e2e; --a: var(--b); background: var(--a); }
    .g2-ref2 { background: #805ad5; }
    .g2-t2   { --b: #805ad5; --a: var(--b); background: var(--a); }

    /* group 3: fallback — var(--undefined, color) */
    .g3-ref1 { background: #dd6b20; }
    .g3-t1   { background: var(--undefined-xx, #dd6b20); }
    /* defined var wins over fallback */
    .g3-ref2 { background: #319795; }
    .g3-t2   { --ok: #319795; background: var(--ok, #ff0000); }

    /* group 4: var() inside calc() for width */
    .g4-ref1 { width: 200px; background: #e53e3e; }
    .g4-t1   { --w: 150px; width: calc(var(--w) + 50px); background: #e53e3e; }
    .g4-ref2 { width: 150px; background: #3182ce; }
    .g4-t2   { --big: 200px; --delta: 50px; width: calc(var(--big) - var(--delta)); background: #3182ce; }

    /* group 5: inheritance — custom prop defined on parent, child uses it */
    .g5-parent { display: flex; gap: 8px; }
    .g5-child  { height: 30px; width: 150px; background: var(--inherited); }
  </style>
</head>
<body>
  <div class="__f">

    <!-- group 1: basic var() substitution -->
    <div class="row">
      <div class="bar g1-ref1" style="width:150px;"></div>
      <div class="bar g1-t1"   style="width:150px;"></div>
      <div style="width:16px;"></div>
      <div class="bar g1-ref2" style="width:150px;"></div>
      <div class="bar g1-t2"   style="width:150px;"></div>
      <div style="width:16px;"></div>
      <div class="bar g1-ref3" style="width:150px;"></div>
      <div class="bar g1-t3"   style="width:150px;"></div>
    </div>

    <div class="sep"></div>

    <!-- group 2: nested var() -->
    <div class="row">
      <div class="bar g2-ref1" style="width:200px;"></div>
      <div class="bar g2-t1"   style="width:200px;"></div>
      <div style="width:32px;"></div>
      <div class="bar g2-ref2" style="width:200px;"></div>
      <div class="bar g2-t2"   style="width:200px;"></div>
    </div>

    <div class="sep"></div>

    <!-- group 3: fallback -->
    <div class="row">
      <div class="bar g3-ref1" style="width:220px;"></div>
      <div class="bar g3-t1"   style="width:220px;"></div>
      <div style="width:32px;"></div>
      <div class="bar g3-ref2" style="width:220px;"></div>
      <div class="bar g3-t2"   style="width:220px;"></div>
    </div>

    <div class="sep"></div>

    <!-- group 4: var() inside calc() -->
    <div class="row">
      <div class="bar g4-ref1"></div>
    </div>
    <div class="row" style="margin-bottom:8px;">
      <div class="bar g4-t1"></div>
    </div>
    <div class="row">
      <div class="bar g4-ref2"></div>
    </div>
    <div class="row">
      <div class="bar g4-t2"></div>
    </div>

    <div class="sep"></div>

    <!-- group 5: inheritance — --inherited set on parent div -->
    <div class="g5-parent" style="--inherited: #e53e3e;">
      <div class="g5-child"></div>
      <div class="g5-child"></div>
      <div class="g5-child"></div>
    </div>
    <div class="sep" style="height:8px;"></div>
    <div class="g5-parent" style="--inherited: #3182ce;">
      <div class="g5-child"></div>
      <div class="g5-child"></div>
      <div class="g5-child"></div>
    </div>
    <div class="sep" style="height:8px;"></div>
    <div class="g5-parent" style="--inherited: #38a169;">
      <div class="g5-child"></div>
      <div class="g5-child"></div>
      <div class="g5-child"></div>
    </div>

  </div>
</body>
</html>
