<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 18 images</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff;  width: 1024px; height: 720px; overflow: hidden;  }
    .cell { display: inline-block; vertical-align: top; margin: 0 16px 16px 0; }
    .frame { background: #0d1520; padding: 3px; }
    .__f { background: #2d3748; width: 1022px; height: 718px; margin: 1px; padding: 24px; overflow: hidden; }
  </style>
</head>
<body>
  <div class="__f">
  <!-- row 1: three PNGs at 200×150 -->
  <div class="cell"><div class="frame">
    <img src="../samples/images/agi_illustration.png" width="200" height="150" alt="">
  </div></div>
  <div class="cell"><div class="frame">
    <img src="../samples/images/perceptron.png" width="200" height="150" alt="">
  </div></div>
  <div class="cell"><div class="frame">
    <img src="../samples/images/sad_brain.png" width="200" height="150" alt="">
  </div></div>
  <div class="cell"><div class="frame">
    <img src="../samples/images/ai_wikipedia.jpg" width="200" height="150" alt="">
  </div></div>

  <!-- row 2: one PNG at three different CSS sizes -->
  <div class="cell"><div class="frame">
    <img src="../samples/images/perceptron.png" style="width: 80px; height: 60px;" alt="">
  </div></div>
  <div class="cell"><div class="frame">
    <img src="../samples/images/perceptron.png" style="width: 160px; height: 120px;" alt="">
  </div></div>
  <div class="cell"><div class="frame">
    <img src="../samples/images/perceptron.png" style="width: 300px; height: 225px;" alt="">
  </div></div>

  <!-- row 3: transparent PNG over different background colors -->
  <div class="cell"><div class="frame" style="background: #ffffff;">
    <img src="../samples/images/sad_brain.png" width="160" height="120" alt="">
  </div></div>
  <div class="cell"><div class="frame" style="background: #e53e3e;">
    <img src="../samples/images/sad_brain.png" width="160" height="120" alt="">
  </div></div>
  <div class="cell"><div class="frame" style="background: #38a169;">
    <img src="../samples/images/sad_brain.png" width="160" height="120" alt="">
  </div></div>
  <div class="cell"><div class="frame" style="background: #3182ce;">
    <img src="../samples/images/sad_brain.png" width="160" height="120" alt="">
  </div></div>

  <!-- row 4: <picture> media / type picking + <img srcset> -->
  <!-- cell A: media query (min-width:500px) matches 1024px viewport → agi_illustration -->
  <div class="cell"><div class="frame">
    <picture>
      <source media="(min-width: 500px)" srcset="../samples/images/agi_illustration.png" width="200" height="150">
      <img src="../samples/images/perceptron.png" width="200" height="150" alt="">
    </picture>
  </div></div>
  <!-- cell B: type="image/avif" → filtered by supported_mime_types → falls back to img src (perceptron) -->
  <div class="cell"><div class="frame">
    <picture>
      <source type="image/avif" srcset="../samples/images/agi_illustration.png">
      <img src="../samples/images/perceptron.png" width="200" height="150" alt="">
    </picture>
  </div></div>
  <!-- cell C: srcset width descriptors — sizes="200px", 480w candidate closest → agi_illustration -->
  <div class="cell"><div class="frame">
    <img srcset="../samples/images/agi_illustration.png 480w, ../samples/images/perceptron.png 1024w"
         sizes="200px" width="200" height="150" alt="">
  </div></div>
  <!-- cell D: srcset density descriptor — 1x candidate at DPR=1.0 → sad_brain -->
  <div class="cell"><div class="frame">
    <img srcset="../samples/images/sad_brain.png 1x, ../samples/images/agi_illustration.png 2x"
         width="160" height="120" alt="">
  </div></div>
  <!-- cell E: WebP decoding — solid blue-teal 200×150 from webp_sample.webp -->
  <div class="cell"><div class="frame">
    <img src="../samples/images/webp_sample.webp" width="200" height="150" alt="">
  </div></div>
  </div>
</body>
</html>
