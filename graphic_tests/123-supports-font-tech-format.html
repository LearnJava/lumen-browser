<!DOCTYPE html>
<!-- CSS Conditional L4 §4 / CSS Fonts L4 §4.3 — @supports font-tech() / font-format().
     A font-tech()/font-format() test is true when the engine implements the given font
     technology / can decode the given font format. Each swatch starts red and turns green
     only when its @supports block applies. To stay identical to Edge this page tests only
     cases where Lumen and Edge agree: both implement OpenType features + variable fonts and
     decode truetype/woff2 (→ green), and both reject the Graphite shaper, Embedded-OpenType
     (EOT) and SVG-font containers (→ red). So a/b/c/d green, e/f red, g green (negation of
     an unsupported test). Graphics only, no text. Edge renders this identically. -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; padding: 0; }
  .__f { background: #ffffff; width: 1022px; height: 718px; margin: 1px; padding: 40px; overflow: hidden; box-sizing: border-box; }

  .row { display: flex; gap: 24px; margin-bottom: 24px; }
  .sw {
    width: 200px;
    height: 140px;
    background: #d64545;        /* default: red = @supports block did NOT apply */
    border: 6px solid #1a202c;
    box-sizing: border-box;
  }

  /* Implemented technologies / decodable formats → block applies → green */
  @supports font-tech(variations)        { .a { background: #2f855a; } }
  @supports font-tech(features-opentype) { .b { background: #2f855a; } }
  @supports font-format(woff2)           { .c { background: #2f855a; } }
  @supports font-format(truetype)        { .d { background: #2f855a; } }

  /* Unsupported in both engines → false → swatch stays red */
  @supports font-tech(features-graphite)  { .e { background: #2b6cb0; } }
  @supports font-format(embedded-opentype) { .f { background: #2b6cb0; } }

  /* Negation of an unsupported test → true → green */
  @supports not font-tech(features-graphite) { .g { background: #2f855a; } }
</style>
</head>
<body>
<div class="__f">
  <div class="row">
    <div class="sw a"></div>
    <div class="sw b"></div>
    <div class="sw c"></div>
    <div class="sw d"></div>
  </div>
  <div class="row">
    <div class="sw e"></div>
    <div class="sw f"></div>
    <div class="sw g"></div>
  </div>
</div>
</body>
</html>
