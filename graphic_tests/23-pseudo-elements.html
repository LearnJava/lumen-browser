<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — ::before / ::after</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff;  width: 1024px; height: 720px; overflow: hidden; }
    .__f { background: #1a1a2e; width: 1022px; height: 718px; margin: 1px; overflow: hidden; }

    /* ::before block-level colored bar */
    .row { margin-top: 40px; margin-left: 40px; }

    .box-before::before {
      content: " ";
      display: block;
      width: 200px;
      height: 60px;
      background: #e63946;
    }
    .box-before {
      width: 200px;
      height: 60px;
      background: #457b9d;
    }

    /* ::after block-level colored bar */
    .box-after {
      width: 200px;
      height: 60px;
      background: #2a9d8f;
      margin-top: 16px;
    }
    .box-after::after {
      content: " ";
      display: block;
      width: 200px;
      height: 60px;
      background: #e9c46a;
    }

    /* Both before and after */
    .box-both {
      width: 200px;
      height: 60px;
      background: #264653;
      margin-top: 16px;
    }
    .box-both::before {
      content: " ";
      display: block;
      width: 200px;
      height: 40px;
      background: #f4a261;
    }
    .box-both::after {
      content: " ";
      display: block;
      width: 200px;
      height: 40px;
      background: #e76f51;
    }

    /* ::before with different width — verifies box model */
    .box-narrow::before {
      content: " ";
      display: block;
      width: 80px;
      height: 60px;
      background: #a8dadc;
    }
    .box-narrow {
      width: 200px;
      height: 60px;
      background: #1d3557;
      margin-top: 16px;
    }

    /* ── Inline pseudo-elements ── */
    /* Containers right-side column at x=290px using absolute positioning */
    .col-inline {
      position: absolute;
      top: 40px;
      left: 290px;
    }
    /* Each inline-row is a block with height+line-height so line has visible area */
    .irow {
      width: 200px;
      height: 50px;
      line-height: 50px;
      background: #1d3557;
      margin-top: 16px;
    }
    .irow:first-child { margin-top: 0; }

    /* ::before inline — colored padded box before a span */
    .sp-before::before {
      content: " ";
      display: inline;
      background: #e63946;
      padding: 0 30px;
    }
    /* ::after inline */
    .sp-after::after {
      content: " ";
      display: inline;
      background: #2a9d8f;
      padding: 0 30px;
    }
    /* both ::before and ::after inline */
    .sp-both::before {
      content: " ";
      display: inline;
      background: #f4a261;
      padding: 0 22px;
    }
    .sp-both::after {
      content: " ";
      display: inline;
      background: #e76f51;
      padding: 0 22px;
    }
  </style>
</head>
<body>
  <div class="__f" style="position:relative;">
  <div class="row">
    <div class="box-before"></div>
    <div class="box-after"></div>
    <div class="box-both"></div>
    <div class="box-narrow"></div>
  </div>
  <div class="col-inline">
    <div class="irow"><span class="sp-before"></span></div>
    <div class="irow"><span class="sp-after"></span></div>
    <div class="irow"><span class="sp-both"></span></div>
  </div>
  </div>
</body>
</html>
