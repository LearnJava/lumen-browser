<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lumen — 66 selection pseudo</title>
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; padding: 0; }
  .__f {
    background: #f0f0f0;
    width: 1022px; height: 718px;
    margin: 1px; padding: 40px;
    overflow: hidden; box-sizing: border-box;
  }

  /* ::selection rules — parsed by engine but not visible without user selection */
  ::selection            { background-color: #0078D4; color: #ffffff; }
  .highlight::selection  { background-color: #e74c3c; color: #ffffff; }
  .custom::selection     { background-color: oklch(60% 0.2 240); color: #000; }

  /* Swatch boxes show what the selection colours look like */
  .swatch-row { display: flex; gap: 20px; margin-bottom: 30px; }
  .swatch {
    width: 180px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-family: sans-serif; color: #fff;
    border-radius: 4px;
  }
  .sw1 { background: #0078D4; }
  .sw2 { background: #e74c3c; }
  .sw3 { background: #1a6ead; }

  .label { font-size: 13px; color: #555; font-family: sans-serif; margin-bottom: 8px; }
  .section { margin-bottom: 30px; }
</style>
</head>
<body>
<div class="__f">
  <div class="section">
    <div class="label">Default ::selection background (#0078D4)</div>
    <div class="swatch-row">
      <div class="swatch sw1">Default</div>
    </div>
  </div>

  <div class="section">
    <div class="label">.highlight::selection (#e74c3c)</div>
    <div class="swatch-row">
      <div class="swatch sw2">Highlight</div>
    </div>
  </div>

  <div class="section">
    <div class="label">.custom::selection (oklch → approx #1a6ead)</div>
    <div class="swatch-row">
      <div class="swatch sw3">Custom</div>
    </div>
  </div>
</div>
</body>
</html>
