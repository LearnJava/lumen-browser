<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 1_000_000 ФИНАЛЬНЫЙ ТЕСТ (все свойства)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* тёмный фон вокруг карточки — видна как рамка */
    body { background: #1a202c; width: 1024px; height: 720px; padding: 50px 62px; }

    /* карточка 900×620 — содержит все тесты */
    .card {
      width: 900px; height: 620px;
      background: #2d3748;
      border: 2px solid #4a5568;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.70),
                  0  0   0  1px rgba(255,255,255,0.04);
      padding: 16px;
    }

    /* ─── TOP: цветовая полоса (48px) ─── */
    .sw { display: inline-block; height: 48px; border-radius: 5px; margin-right: 6px; }

    /* ─── MIDDLE: 3 колонки (530px) ─── */
    .mid  { height: 530px; font-size: 0; }   /* font-size:0 убирает пробелы между inline-block */
    .lcol { display: inline-block; vertical-align: top; width: 180px; }
    .mcol { display: inline-block; vertical-align: top; width: 488px; margin: 0 10px; }
    .rcol { display: inline-block; vertical-align: top; width: 180px; }

    /* бокс для border-демо */
    .bx { height: 68px; background: #1a202c; margin-bottom: 8px; }

    /* бокс для shadow-демо */
    .shbox { height: 48px; background: #fff; border-radius: 4px; margin-bottom: 10px; }
      .__m { width: 1024px; height: 1px; background: #ff00ff; }
  </style>
</head>
<body>
  <div class="__m"></div>
<div class="card">

  <!-- ══ TOP: color strip (48px + 10px gap) ══════════════════════════════════ -->
  <div style="height: 48px; margin-bottom: 10px; font-size: 0;">
    <div class="sw" style="width: 100px; background: #e53e3e;"></div>
    <div class="sw" style="width: 100px; background: rgb(49,130,206);"></div>
    <div class="sw" style="width: 100px; background: hsl(120,45%,45%);"></div>
    <div class="sw" style="width: 100px; background: #d69e2e;"></div>
    <div class="sw" style="width: 100px; background: rgba(128,90,213,0.90);"></div>
    <div class="sw" style="width: 100px; background: tomato;"></div>
    <div class="sw" style="width: 100px; background: #0af;"></div>
    <div class="sw" style="width:  58px; background: hsla(300,70%,50%,0.70); margin-right: 0;"></div>
  </div>
  <!-- 7×100 + 1×58 + 7×6(gap) = 800px ≤ 868(card inner) -->

  <!-- ══ MIDDLE (530px) ════════════════════════════════════════════════════════ -->
  <div class="mid">

    <!-- ── LEFT (180px): border showcase ───────────────────────────────────── -->
    <div class="lcol">

      <!-- uniform border: 1px / 4px / 8px -->
      <div class="bx" style="border: 1px solid #63b3ed;"></div>
      <div class="bx" style="border: 4px solid #63b3ed;"></div>
      <div class="bx" style="border: 8px solid #e53e3e; border-radius: 8px;"></div>

      <!-- per-side colors + mixed widths -->
      <div class="bx" style="border-top:    8px solid #fc8181;
                              border-right:  3px solid #f6e05e;
                              border-bottom: 8px solid #68d391;
                              border-left:   3px solid #63b3ed;"></div>

      <!-- currentColor — border берёт цвет из color -->
      <div class="bx" style="color: #ed8936; border: 5px solid;"></div>

      <!-- padding layering: серый ободок = padding, синее = content -->
      <div style="height: 80px; background: #4a5568;
                  border: 3px solid #63b3ed; border-radius: 4px; padding: 14px;">
        <div style="background: #1a202c; width: 100%; height: 100%;"></div>
      </div>

    </div><!-- /lcol -->

    <!-- ── CENTER (488px): image + effects ──────────────────────────────────── -->
    <div class="mcol">

      <!-- главное изображение: border + shadow + overflow:hidden + object-fit:cover -->
      <div style="border: 4px solid #4a5568;
                  box-shadow: 0 8px 28px rgba(0,0,0,0.65);
                  overflow: hidden;
                  height: 218px;
                  border-radius: 6px;
                  margin-bottom: 10px;">
        <img src="../samples/images/agi_illustration.png"
             style="display: block; width: 100%; height: 100%; object-fit: cover;" alt="">
      </div>

      <!-- object-fit: 5 режимов (маленькие боксы) -->
      <div style="font-size: 0; margin-bottom: 10px;">
        <div style="display:inline-block;width:85px;height:56px;overflow:hidden;
                    background:#1a202c;border:1px solid #4a5568;margin-right:6px;">
          <img src="../samples/images/perceptron.png"
               style="display:block;width:100%;height:100%;object-fit:fill;" alt="">
        </div>
        <div style="display:inline-block;width:85px;height:56px;overflow:hidden;
                    background:#1a202c;border:1px solid #4a5568;margin-right:6px;">
          <img src="../samples/images/perceptron.png"
               style="display:block;width:100%;height:100%;object-fit:contain;" alt="">
        </div>
        <div style="display:inline-block;width:85px;height:56px;overflow:hidden;
                    background:#1a202c;border:1px solid #4a5568;margin-right:6px;">
          <img src="../samples/images/perceptron.png"
               style="display:block;width:100%;height:100%;object-fit:cover;" alt="">
        </div>
        <div style="display:inline-block;width:85px;height:56px;overflow:hidden;
                    background:#1a202c;border:1px solid #4a5568;margin-right:6px;">
          <img src="../samples/images/perceptron.png"
               style="display:block;width:100%;height:100%;object-fit:none;" alt="">
        </div>
        <div style="display:inline-block;width:85px;height:56px;overflow:hidden;
                    background:#1a202c;border:1px solid #4a5568;">
          <img src="../samples/images/perceptron.png"
               style="display:block;width:100%;height:100%;object-fit:scale-down;" alt="">
        </div>
      </div>

      <!-- overflow:visible(красный) vs overflow:hidden(синий) + opacity 3 уровня -->
      <div style="font-size: 0; margin-bottom: 10px;">
        <div style="display:inline-block;width:100px;height:68px;background:#1a202c;
                    overflow:visible;border:1px solid #4a5568;margin-right:8px;">
          <div style="width:144px;height:100px;background:rgba(229,62,62,0.75);"></div>
        </div>
        <div style="display:inline-block;width:100px;height:68px;background:#1a202c;
                    overflow:hidden;border:1px solid #4a5568;margin-right:20px;">
          <div style="width:144px;height:100px;background:rgba(49,130,206,0.75);"></div>
        </div>
        <!-- opacity: 0.3 / 0.6 / 1.0 -->
        <div style="display:inline-block;width:72px;height:68px;background:#38a169;opacity:0.3;margin-right:8px;"></div>
        <div style="display:inline-block;width:72px;height:68px;background:#38a169;opacity:0.6;margin-right:8px;"></div>
        <div style="display:inline-block;width:72px;height:68px;background:#38a169;opacity:1.0;"></div>
      </div>

      <!-- calc: серая полоса = эталон 200px, зелёные = вычисленные выражения -->
      <div style="background:#718096;height:20px;width:200px;margin-bottom:5px;border-radius:2px;"></div>
      <div style="background:#38a169;height:20px;width:calc(100px + 100px);margin-bottom:5px;border-radius:2px;"></div>
      <div style="background:#38a169;height:20px;width:min(200px, 350px);margin-bottom:5px;border-radius:2px;"></div>
      <div style="background:#38a169;height:20px;width:clamp(100px, 250px, 200px);border-radius:2px;"></div>

    </div><!-- /mcol -->

    <!-- ── RIGHT (180px): outline + shadow + visibility ─────────────────────── -->
    <div class="rcol">

      <!-- outline: thin / offset+ / offset- -->
      <div style="height:64px;background:#1a202c;outline:3px solid #e2e8f0;margin-bottom:18px;"></div>
      <div style="height:64px;background:#1a202c;outline:3px solid #63b3ed;outline-offset:6px;margin-bottom:26px;"></div>
      <div style="height:64px;background:#1a202c;outline:4px solid #fc8181;outline-offset:-8px;margin-bottom:18px;"></div>

      <!-- box-shadow: hard / blurred / spread-outline -->
      <div style="background:#f0f4f8;padding:10px;border-radius:6px;margin-bottom:14px;">
        <div class="shbox" style="box-shadow:  6px  6px  0   0  rgba(0,0,0,0.35);"></div>
        <div class="shbox" style="box-shadow:  6px  6px 14px 0  rgba(0,0,0,0.35);"></div>
        <div class="shbox" style="box-shadow:  0    0    0   6px #3182ce; margin-bottom:0;"></div>
      </div>

      <!-- visibility:hidden — средний бокс невидим, но место сохранено (виден зазор) -->
      <div style="font-size:0;">
        <div style="display:inline-block;width:52px;height:36px;background:#38a169;border-radius:3px;"></div>
        <div style="display:inline-block;width:52px;height:36px;background:#38a169;border-radius:3px;visibility:hidden;"></div>
        <div style="display:inline-block;width:52px;height:36px;background:#38a169;border-radius:3px;"></div>
      </div>

    </div><!-- /rcol -->

  </div><!-- /mid -->

  <!-- ── ::before / ::after demo ──────────────────────────────────────────── -->
  <style>
    .pe-row { margin-top: 12px; margin-left: 24px; }
    .pe-box { width: 120px; height: 30px; background: #2d3748; display: inline-block; vertical-align: top; margin-right: 8px; }
    .pe-box::before { content: " "; display: block; width: 120px; height: 12px; background: #e63946; }
    .pe-box::after  { content: " "; display: block; width: 120px; height: 12px; background: #2a9d8f; }
  </style>
  <div class="pe-row">
    <div class="pe-box"></div>
    <div class="pe-box"></div>
    <div class="pe-box"></div>
  </div>

  <!-- ── vertical-align demo ───────────────────────────────────────────────── -->
  <style>
    .va-row { margin-top: 12px; margin-left: 24px; white-space: nowrap; }
    .va-top    { display: inline-block; width: 60px; height: 80px; background: #e63946; vertical-align: top; }
    .va-mid    { display: inline-block; width: 60px; height: 50px; background: #2a9d8f; vertical-align: middle; }
    .va-bot    { display: inline-block; width: 60px; height: 30px; background: #457b9d; vertical-align: bottom; }
  </style>
  <div class="va-row">
    <div class="va-top"></div>
    <div class="va-mid"></div>
    <div class="va-bot"></div>
  </div>

  <!-- ── table layout demo ────────────────────────────────────────────────── -->
  <style>
    .tbl-row { margin-top: 8px; margin-left: 24px; }
    .tbl-row table { border-collapse: collapse; border-spacing: 0; }
    .tbl-row td { padding: 0; border: 0; }
  </style>
  <div class="tbl-row">
    <table>
      <tr>
        <td style="width:80px;height:24px;background:#e63946"></td>
        <td style="width:80px;height:24px;background:#f4a261"></td>
        <td style="width:80px;height:24px;background:#2a9d8f"></td>
        <td style="width:80px;height:24px;background:#457b9d"></td>
      </tr>
      <tr>
        <td style="width:80px;height:24px;background:#6a994e"></td>
        <td style="width:80px;height:24px;background:#e76f51"></td>
        <td style="width:80px;height:24px;background:#e9c46a"></td>
        <td style="width:80px;height:24px;background:#264653"></td>
      </tr>
    </table>
  </div>

  <!-- mask-image demo: Phase 0 — gradient masks render at full opacity (no-op) -->
  <div style="margin-top:8px;display:flex;gap:8px">
    <div style="width:60px;height:30px;background:#e63946;mask-image:linear-gradient(to right,black,transparent)"></div>
    <div style="width:60px;height:30px;background:#2a9d8f;mask-image:radial-gradient(circle,black 40%,transparent 70%)"></div>
    <div style="width:60px;height:30px;background:#e9c46a"></div>
  </div>

  <!-- direction: rtl — alignment bars (LTR-start=left · RTL-start=right · RTL-end=left) -->
  <div style="margin-top:8px;display:flex;gap:6px">
    <div style="width:90px;height:24px;background:linear-gradient(to right,#4a90d9 60%,#16213e 60%);border:1px solid #4a90d9"></div>
    <div style="width:90px;height:24px;background:linear-gradient(to left,#e94560 60%,#16213e 60%);border:1px solid #e94560"></div>
    <div style="width:90px;height:24px;background:linear-gradient(to right,#f5a623 60%,#16213e 60%);border:1px solid #f5a623"></div>
  </div>

  <!-- CSS Containment: contain:size (height=0) · contain:paint (clip) · baseline -->
  <div style="margin-top:8px;display:flex;gap:6px;align-items:flex-start">
    <div style="width:70px;background:#374151;border:1px solid #6b7280">
      <div style="background:#9ca3af;height:30px;width:55px"></div>
    </div>
    <div style="contain:size;width:70px;background:#1f6feb;border:1px solid #388bfd">
      <div style="background:#58a6ff;height:30px;width:55px"></div>
    </div>
    <div style="contain:paint;width:70px;height:30px;background:#238636;border:1px solid #2ea043;overflow:visible">
      <div style="background:#3fb950;height:20px;width:90px;margin-top:5px"></div>
    </div>
  </div>

  <!-- @container queries: wide(blue tall) · narrow(red short) · named(green) · max-width(yellow) -->
  <style>
    .cq-wide  { container-type:size; width:120px; height:50px; background:#0f3460; border:1px solid #1a5276; }
    .cq-narrow{ container-type:size; width:60px;  height:50px; background:#0f3460; border:1px solid #922b21; }
    .cq-named { container-type:size; container-name:fin-sidebar; width:100px; height:50px; background:#1a4a1a; border:1px solid #27ae60; }
    .cq-maxw  { container-type:inline-size; width:80px; height:50px; background:#2d2d2d; border:1px solid #d4ac0d; }
    .cq-child { width:100%; height:10px; background:#e74c3c; }
    @container (min-width: 100px) { .cq-child { height:30px; background:#3498db; } }
    @container fin-sidebar (min-width: 80px) { .cq-child { height:30px; background:#2ecc71; } }
    @container (max-width: 150px) { .cq-child { height:30px; background:#f1c40f; } }
  </style>
  <div style="margin-top:8px;display:flex;gap:6px;align-items:flex-start">
    <div class="cq-wide"><div class="cq-child"></div></div>
    <div class="cq-narrow"><div class="cq-child"></div></div>
    <div class="cq-named"><div class="cq-child"></div></div>
    <div class="cq-maxw"><div class="cq-child"></div></div>
  </div>

  <!-- CSS filter -->
  <div style="margin-top:8px; font-size:10px; color:#888;">filter:</div>
  <div style="display:flex; gap:6px; flex-wrap:wrap;">
    <div style="width:40px;height:40px;background:#4299e1;"></div>
    <div style="width:40px;height:40px;background:#4299e1;filter:grayscale(1);"></div>
    <div style="width:40px;height:40px;background:#4299e1;filter:sepia(1);"></div>
    <div style="width:40px;height:40px;background:#4299e1;filter:brightness(2);"></div>
    <div style="width:40px;height:40px;background:#4299e1;filter:invert(1);"></div>
    <div style="width:40px;height:40px;background:#4299e1;filter:opacity(0.4);"></div>
    <div style="width:40px;height:40px;background:#e53e3e;filter:hue-rotate(90deg);"></div>
    <div style="width:80px;height:40px;background:linear-gradient(to right,#e53e3e 50%,#38a169 50%);filter:blur(4px);"></div>
  </div>

  <!-- backdrop-filter (requires parent stacking context via opacity:0.999) -->
  <div style="margin-top:8px; font-size:10px; color:#888;">backdrop-filter:</div>
  <div style="display:flex; gap:6px;">
    <div style="position:relative; width:280px; height:44px; opacity:0.999;">
      <div style="position:absolute;inset:0;background:linear-gradient(to right,#e53e3e,#ecc94b,#48bb78,#4299e1,#9f7aea);"></div>
      <div style="position:absolute;top:4px;left:0;width:40px;height:36px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);"></div>
      <div style="position:absolute;top:4px;left:50px;width:40px;height:36px;background:rgba(255,255,255,0.15);backdrop-filter:grayscale(1);"></div>
      <div style="position:absolute;top:4px;left:100px;width:40px;height:36px;background:rgba(255,255,255,0.15);backdrop-filter:brightness(1.8);"></div>
      <div style="position:absolute;top:4px;left:150px;width:40px;height:36px;background:rgba(255,255,255,0.15);backdrop-filter:invert(1);"></div>
      <div style="position:absolute;top:4px;left:200px;width:40px;height:36px;background:rgba(255,255,255,0.15);backdrop-filter:blur(4px) brightness(0.6);"></div>
    </div>
  </div>

  <!-- clip-path -->
  <div style="margin-top:8px; font-size:10px; color:#888;">clip-path:</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <div style="width:50px;height:50px;background:#e63946;clip-path:inset(8px);"></div>
    <div style="width:50px;height:50px;background:#457b9d;clip-path:circle(20px);"></div>
    <div style="width:60px;height:40px;background:#2a9d8f;clip-path:ellipse(25px 15px);"></div>
    <div style="width:50px;height:50px;background:#e9c46a;clip-path:polygon(25px 0px,50px 50px,0px 50px);"></div>
  </div>

  <!-- list markers -->
  <div style="margin-top:8px; font-size:10px; color:#888;">list markers:</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <ul style="list-style-type:disc;padding-left:20px;color:#e0e0e0;font-size:11px;">
      <li style="background:#16213e;">Disc A</li>
      <li style="background:#16213e;">Disc B</li>
    </ul>
    <ol style="list-style-type:decimal;padding-left:24px;color:#e0e0e0;font-size:11px;">
      <li style="background:#0f3460;">One</li>
      <li style="background:#0f3460;">Two</li>
    </ol>
    <ul style="list-style-type:none;padding-left:0;color:#e0e0e0;font-size:11px;">
      <li style="background:#1a1a2e;">None X</li>
      <li style="background:#1a1a2e;">None Y</li>
    </ul>
  </div>

  <!-- multi-column + column-rule -->
  <div style="margin-top:8px; font-size:10px; color:#888;">multi-column + column-rule:</div>
  <div style="column-count:3;column-gap:20px;column-rule:3px solid #fc8181;
              width:600px;height:40px;background:#2d3748;margin-bottom:6px;">
    <div style="background:#4a5568;height:40px;"></div>
    <div style="background:#4a5568;height:40px;"></div>
    <div style="background:#4a5568;height:40px;"></div>
  </div>
  <div style="column-count:4;column-gap:16px;column-rule:2px dashed #76e4f7;
              width:700px;height:40px;background:#2d3748;">
    <div style="background:#4a5568;height:40px;"></div>
    <div style="background:#4a5568;height:40px;"></div>
    <div style="background:#4a5568;height:40px;"></div>
    <div style="background:#4a5568;height:40px;"></div>
  </div>

  <!-- CSS Grid named areas -->
  <div style="margin-top:8px; font-size:10px; color:#888;">CSS Grid named areas (grid-template-areas):</div>
  <div style="display:grid;
              grid-template-columns:80px 160px 160px;
              grid-template-rows:30px 50px;
              grid-template-areas:'h h h' 's m m';
              gap:2px; width:404px; margin-bottom:4px;">
    <div style="grid-area:h; background:#3182ce;"></div>
    <div style="grid-area:s; background:#38a169;"></div>
    <div style="grid-area:m; background:#e53e3e;"></div>
  </div>

  <!-- float + clear -->
  <div style="width:404px; margin-top:8px; margin-bottom:4px; overflow:hidden;">
    <div style="float:left;  width:80px; height:40px; background:#3182ce; margin-right:4px;"></div>
    <div style="float:right; width:80px; height:40px; background:#38a169;"></div>
    <div style="height:40px; background:#bee3f8;"></div>
    <div style="clear:both;  height:14px; background:#fc8181;"></div>
  </div>

  <!-- z-index stacking: red(z3) > blue(z2) > green(z1) -->
  <div style="position:relative; width:120px; height:80px; margin-top:8px;">
    <div style="position:absolute; width:80px; height:60px; background:#00cc44; top:10px; left:0; z-index:1;"></div>
    <div style="position:absolute; width:60px; height:60px; background:#2255cc; top:10px; left:20px; z-index:2;"></div>
    <div style="position:absolute; width:40px; height:60px; background:#ee2222; top:10px; left:40px; z-index:3;"></div>
  </div>

  <!-- linear-gradient / radial-gradient GPU pipeline -->
  <div style="display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;">
    <div style="width:120px;height:40px;background:linear-gradient(to right,#e63946,#457b9d);"></div>
    <div style="width:120px;height:40px;background:linear-gradient(45deg,#6a0dad,#ff6b6b);"></div>
    <div style="width:120px;height:40px;background:linear-gradient(to right,#f72585,#7209b7,#4cc9f0);"></div>
    <div style="width:80px; height:40px;background:radial-gradient(circle,#a8edea,#fed6e3);"></div>
    <div style="width:80px; height:40px;background:radial-gradient(circle at 25% 25%,#f9ca24,#6ab04c);"></div>
    <div style="width:80px; height:40px;background:repeating-linear-gradient(45deg,#333 0px,#333 6px,#666 6px,#666 12px);"></div>
  </div>

  <!-- conic-gradient (CSS Images L4 §3.7) -->
  <div style="display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;">
    <div style="width:60px; height:60px;background:conic-gradient(#e63946,#f1faee,#a8dadc,#457b9d,#1d3557,#e63946);"></div>
    <div style="width:60px; height:60px;background:conic-gradient(from 90deg,#f72585,#7209b7,#4cc9f0,#f72585);"></div>
    <div style="width:60px; height:60px;background:conic-gradient(at 25% 25%,#fb5607,#ffbe0b,#8338ec,#fb5607);"></div>
    <div style="width:60px; height:60px;background:conic-gradient(red 0deg,red 90deg,yellow 90deg,yellow 180deg,green 180deg,green 270deg,blue 270deg,blue 360deg);"></div>
    <div style="width:60px; height:60px;background:repeating-conic-gradient(#1a1a2e 0deg,#1a1a2e 45deg,#f1faee 45deg,#f1faee 90deg);"></div>
  </div>


  <!-- CSS Backgrounds L3 §3 — multiple background layers -->
  <div style="margin-top:8px;display:flex;gap:8px;">
    <div style="width:80px;height:50px;background:linear-gradient(135deg,rgba(255,80,80,0.7) 0%,transparent 60%),linear-gradient(to bottom,#1a6db5,#0a3a6b);"></div>
    <div style="width:80px;height:50px;background:radial-gradient(circle,#e74c3c 0%,transparent 50%) center/60px 60px no-repeat,#2c3e50;"></div>
    <div style="width:80px;height:50px;background:linear-gradient(to right,rgba(255,255,255,0.3),transparent),#8e44ad;"></div>
    <div style="width:80px;height:50px;background:linear-gradient(90deg,rgba(255,255,255,0.25) 50%,transparent 50%) left/20px 100% repeat-x,#27ae60;"></div>
  </div>

  <!-- position:sticky demo — 3 sticky elements at different insets (static snapshot) -->
  <div style="margin-top:8px;position:relative;width:500px;height:40px;background:#0d1117;overflow:hidden">
    <div style="position:sticky;top:5px;left:0;width:120px;height:30px;background:#e94560"></div>
    <div style="position:sticky;top:5px;left:130px;width:80px;height:30px;background:#533483"></div>
    <div style="position:sticky;bottom:5px;right:0;width:100px;height:30px;background:#f5a623;margin-left:260px"></div>
  </div>


<!-- border-radius elliptical (rx ≠ ry) demo -->
<div style="margin-top:8px;">
  <div style="display:inline-block;width:80px;height:50px;background:#63b3ed;border-radius:40px/25px;margin-right:6px;"></div>
  <div style="display:inline-block;width:100px;height:40px;background:#68d391;border-radius:50px/10px;margin-right:6px;"></div>
  <div style="display:inline-block;width:50px;height:80px;background:#f687b3;border-radius:10px/40px;margin-right:6px;"></div>
  <div style="display:inline-block;width:90px;height:60px;background:#9f7aea;border-top-left-radius:40px 20px;border-top-right-radius:5px;margin-right:6px;"></div>
  <div style="display:inline-block;width:100px;height:50px;background:#ed8936;border:3px solid #c05621;border-radius:30px/15px;margin-right:6px;"></div>
</div>

<!-- CSS Intrinsic Sizing L3 — max-content / min-content / fit-content -->
<div style="margin-top:8px;background:#1a202c;padding:6px;">
  <div style="width:max-content;height:20px;background:#e53e3e;margin-bottom:4px;overflow:hidden;">
    <div style="width:200px;height:100%;"></div>
  </div>
  <div style="width:min-content;height:20px;background:#38a169;margin-bottom:4px;overflow:hidden;">
    <div style="width:150px;height:100%;"></div>
  </div>
  <div style="width:fit-content;height:20px;background:#3182ce;overflow:hidden;">
    <div style="width:260px;height:100%;"></div>
  </div>
</div>


<!-- Media Queries L3 #12 — screen/print/min-width(em)/orientation/aspect-ratio -->
<style>
  .mq-row { display:flex; gap:6px; margin-top:8px; }
  .mq-box { width:80px; height:30px; background:#333; }
  @media screen { #mq1 { background:#22c55e; } }
  @media print  { #mq2 { background:#ef4444; } }
  @media (min-width: 48em) { #mq3 { background:#3b82f6; } }
  @media (orientation: landscape) { #mq4 { background:#a855f7; } }
  @media (min-aspect-ratio: 1/1) { #mq5 { background:#06b6d4; } }
</style>
<div class="mq-row">
  <div class="mq-box" id="mq1"></div>
  <div class="mq-box" id="mq2"></div>
  <div class="mq-box" id="mq3"></div>
  <div class="mq-box" id="mq4"></div>
  <div class="mq-box" id="mq5"></div>
</div>


<!-- CSS Transforms L2 — individual translate / rotate / scale properties -->
<style>
  .it-row { display:flex; gap:10px; margin-top:10px; align-items:center; }
  .it-box { width:30px; height:30px; background:#e94560; flex-shrink:0; }
</style>
<div class="it-row">
  <div class="it-box" style="translate:12px 4px;"></div>
  <div class="it-box" style="rotate:45deg; background:#2a9d8f;"></div>
  <div class="it-box" style="scale:1.4; background:#457b9d;"></div>
  <div class="it-box" style="scale:1.5 0.6; background:#e76f51;"></div>
  <div class="it-box" style="translate:8px;rotate:20deg;scale:1.2;background:#f4a261;"></div>
</div>

<!-- picture/srcset — media query + type filter + width descriptors -->
<style>
  .ps-row { display:flex; gap:8px; margin-top:10px; align-items:flex-start; }
  .ps-frame { background:#0d1520; padding:2px; }
</style>
<div class="ps-row">
  <!-- media (min-width:500px) → agi_illustration at 1024px viewport -->
  <div class="ps-frame">
    <picture>
      <source media="(min-width: 500px)" srcset="../samples/images/agi_illustration.png" width="100" height="75">
      <img src="../samples/images/perceptron.png" width="100" height="75" alt="">
    </picture>
  </div>
  <!-- type="image/avif" filtered → perceptron fallback -->
  <div class="ps-frame">
    <picture>
      <source type="image/avif" srcset="../samples/images/agi_illustration.png">
      <img src="../samples/images/perceptron.png" width="100" height="75" alt="">
    </picture>
  </div>
  <!-- srcset 480w/1024w, sizes=100px → 480w candidate (agi_illustration) -->
  <div class="ps-frame">
    <img srcset="../samples/images/agi_illustration.png 480w, ../samples/images/perceptron.png 1024w"
         sizes="100px" width="100" height="75" alt="">
  </div>
  <!-- srcset 1x/2x, DPR=1.0 → 1x = sad_brain -->
  <div class="ps-frame">
    <img srcset="../samples/images/sad_brain.png 1x, ../samples/images/agi_illustration.png 2x"
         width="80" height="60" alt="">
  </div>
  <!-- WebP decoding: solid blue-teal 100×75 from webp_sample.webp -->
  <div class="ps-frame">
    <img src="../samples/images/webp_sample.webp" width="100" height="75" alt="">
  </div>
</div>

</div><!-- /card -->
</body>
</html>
