<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TEST-47: SVG basic shapes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff; width: 1024px; height: 720px; }
    .__f {
      background: #1a1a2e;
      width: 1022px; height: 718px;
      margin: 1px;
      padding: 20px;
      overflow: hidden;
    }
  </style>
</head>
<body>
<div class="__f">

  <!-- Row 1: rect, circle, ellipse (no viewBox — 1:1 mapping) -->
  <svg width="320" height="120" style="display:inline-block; margin-right:20px;">
    <rect x="10" y="10" width="100" height="60" style="fill:#e74c3c;"/>
    <rect x="130" y="20" width="60" height="40" rx="10" ry="10" style="fill:#3498db;"/>
    <circle cx="260" cy="40" r="35" style="fill:#2ecc71;"/>
  </svg>

  <!-- Row 1 cont: ellipse + line -->
  <svg width="320" height="120" style="display:inline-block; margin-right:20px;">
    <ellipse cx="80" cy="60" rx="70" ry="40" style="fill:#9b59b6;"/>
    <line x1="180" y1="20" x2="300" y2="100" style="stroke:#f39c12; stroke-width:6; fill:none;"/>
  </svg>

  <br style="line-height:0;"/>

  <!-- Row 2: viewBox scale 2× -->
  <svg width="200" height="200" viewBox="0 0 100 100" style="display:inline-block; margin-right:20px; margin-top:10px;">
    <rect x="10" y="10" width="30" height="30" style="fill:#e74c3c;"/>
    <circle cx="70" cy="30" r="20" style="fill:#3498db;"/>
    <ellipse cx="50" cy="75" rx="35" ry="15" style="fill:#f1c40f;"/>
  </svg>

  <!-- Row 2 cont: group + nested shapes -->
  <svg width="300" height="200" style="display:inline-block; margin-top:10px;">
    <g>
      <rect x="10" y="10" width="80" height="80" style="fill:#1abc9c;"/>
      <circle cx="150" cy="50" r="40" style="fill:#e67e22;"/>
      <rect x="220" y="20" width="60" height="60" rx="8" ry="8" style="fill:#c0392b;"/>
    </g>
    <g>
      <ellipse cx="60" cy="155" rx="45" ry="25" style="fill:#8e44ad;"/>
      <rect x="120" y="130" width="150" height="50" style="fill:#27ae60;"/>
    </g>
  </svg>

  <br style="line-height:0;"/>

  <!-- Row 3: viewBox with min_x/min_y offset -->
  <svg width="200" height="150" viewBox="50 50 200 150" style="display:inline-block; margin-top:10px; margin-right:20px;">
    <rect x="60" y="60" width="80" height="60" style="fill:#2980b9;"/>
    <circle cx="200" cy="120" r="50" style="fill:#e74c3c;"/>
  </svg>

  <!-- Row 3 cont: multiple shapes no viewBox -->
  <svg width="400" height="150" style="display:inline-block; margin-top:10px;">
    <rect x="0" y="0" width="70" height="150" style="fill:#2c3e50;"/>
    <rect x="80" y="20" width="60" height="110" style="fill:#34495e;"/>
    <rect x="150" y="40" width="50" height="70" style="fill:#7f8c8d;"/>
    <rect x="210" y="60" width="40" height="30" style="fill:#95a5a6;"/>
    <circle cx="310" cy="75" r="60" style="fill:#16a085;"/>
    <ellipse cx="370" cy="75" rx="25" ry="60" style="fill:#d35400;"/>
  </svg>

  <br style="line-height:0;"/>

  <!-- Row 4: stroke, fill-opacity, stroke-opacity, stroke-width -->
  <svg width="980" height="140" style="display:inline-block; margin-top:10px;">
    <!-- rect with stroke only (fill:none) -->
    <rect x="10" y="20" width="100" height="80" style="fill:none; stroke:#e74c3c; stroke-width:4;"/>
    <!-- rect with fill + stroke -->
    <rect x="130" y="20" width="100" height="80" style="fill:#3498db; stroke:#f1c40f; stroke-width:6;"/>
    <!-- circle with fill-opacity -->
    <circle cx="320" cy="60" r="50" style="fill:#e74c3c; fill-opacity:0.5;"/>
    <!-- circle stroke-only -->
    <circle cx="430" cy="60" r="40" style="fill:none; stroke:#2ecc71; stroke-width:5;"/>
    <!-- ellipse with stroke -->
    <ellipse cx="560" cy="60" rx="60" ry="40" style="fill:#9b59b6; stroke:#f39c12; stroke-width:3;"/>
    <!-- thick stroke rect -->
    <rect x="650" y="10" width="80" height="100" rx="10" ry="10" style="fill:#1abc9c; stroke:#c0392b; stroke-width:8;"/>
    <!-- stroke-opacity demo -->
    <rect x="760" y="20" width="100" height="80" style="fill:#e67e22; stroke:#2c3e50; stroke-width:10; stroke-opacity:0.4;"/>
    <!-- fill:none stroke circle — white on dark bg -->
    <circle cx="920" cy="60" r="45" style="fill:none; stroke:#ffffff; stroke-width:4;"/>
  </svg>

</div>
</body>
</html>
