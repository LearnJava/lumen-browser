<!DOCTYPE html>
<!-- Media Queries L5 §5.7 — prefers-reduced-transparency.
     With no user preference set (the engine default), `(prefers-reduced-transparency:
     no-preference)` matches while `(prefers-reduced-transparency: reduce)` does not.
     Each swatch starts red and turns green only when its media query matches. On a
     correct engine the "no-preference" swatch is green and the "reduce" swatch stays
     red (blue would mean it wrongly matched). Edge defaults to no-preference too, so
     the rendering agrees. Graphics only, no text. -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; padding: 0; }
  .__f { background: #ffffff; width: 1022px; height: 718px; margin: 1px; padding: 40px; overflow: hidden; box-sizing: border-box; }

  .row { display: flex; gap: 24px; margin-bottom: 24px; }
  .sw {
    width: 200px;
    height: 140px;
    background: #d64545;        /* default: red = query did NOT match */
    border: 6px solid #1a202c;
    box-sizing: border-box;
  }

  /* Default (no preference) matches → green */
  @media (prefers-reduced-transparency: no-preference) { .a { background: #2f855a; } }

  /* Default does NOT match → swatch stays red; blue if it wrongly matches */
  @media (prefers-reduced-transparency: reduce)        { .b { background: #2b6cb0; } }

  /* Invalid value → Unsupported → never matches → stays red */
  @media (prefers-reduced-transparency: low)           { .c { background: #2b6cb0; } }
</style>
</head>
<body>
<div class="__f">
  <div class="row">
    <div class="sw a"></div>
    <div class="sw b"></div>
    <div class="sw c"></div>
  </div>
</div>
</body>
</html>
