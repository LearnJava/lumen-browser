<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lumen — 112 clip-path fill-rule</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ff00ff; width: 1024px; height: 720px; }
  .__f {
    background: #1a1a2e;
    width: 1022px; height: 718px;
    margin: 1px;
    padding: 40px;
    overflow: hidden;
  }

  .row { display: flex; gap: 30px; margin-bottom: 40px; }
  .star {
    width: 140px; height: 140px;
    flex-shrink: 0;
  }

  /* CSS Shapes L1 §4 — path() с self-intersecting пентаграммой.
     nonzero (default) заливает звезду целиком; evenodd оставляет
     полый пятиугольник в центре. Путь обходит вершины через одну. */
  .path-nz { background: #e63946; clip-path: path("M 70 7 L 29 126 L 137 49 L 3 49 L 111 126 Z"); }
  .path-eo { background: #e63946; clip-path: path(evenodd, "M 70 7 L 29 126 L 137 49 L 3 49 L 111 126 Z"); }

  /* CSS Shapes L1 §3 — polygon() с тем же пентаграммой-контуром. */
  .poly-nz { background: #457b9d; clip-path: polygon(70px 7px, 29px 126px, 137px 49px, 3px 49px, 111px 126px); }
  .poly-eo { background: #457b9d; clip-path: polygon(evenodd, 70px 7px, 29px 126px, 137px 49px, 3px 49px, 111px 126px); }

  /* Два перекрывающихся квадрата одним полигоном (контур-восьмёрка):
     evenodd вычитает область пересечения, nonzero заливает всё. */
  .ov-nz { background: #2a9d8f; clip-path: polygon(10px 10px, 90px 10px, 90px 90px, 10px 90px, 10px 10px, 50px 50px, 130px 50px, 130px 130px, 50px 130px, 50px 50px); }
  .ov-eo { background: #2a9d8f; clip-path: polygon(evenodd, 10px 10px, 90px 10px, 90px 90px, 10px 90px, 10px 10px, 50px 50px, 130px 50px, 130px 130px, 50px 130px, 50px 50px); }
</style>
</head>
<body>
<div class="__f">

  <!-- Row 1: path() — nonzero (заливка) vs evenodd (полый центр) -->
  <div class="row">
    <div class="star path-nz"></div>
    <div class="star path-eo"></div>
  </div>

  <!-- Row 2: polygon() — nonzero vs evenodd -->
  <div class="row">
    <div class="star poly-nz"></div>
    <div class="star poly-eo"></div>
  </div>

  <!-- Row 3: перекрывающиеся квадраты — nonzero vs evenodd -->
  <div class="row">
    <div class="star ov-nz"></div>
    <div class="star ov-eo"></div>
  </div>

</div>
</body>
</html>
