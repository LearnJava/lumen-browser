<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lumen — 29 container queries</title>
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; padding: 0; }
  .__f { background: #0d1117; width: 1022px; height: 718px; margin: 1px; padding: 30px; overflow: hidden; box-sizing: border-box; }

  .row { display: flex; gap: 20px; margin-bottom: 24px; }

  /* --- Wide container (300px): @container(min-width:200px) applies → tall child --- */
  .c-wide {
    container-type: size;
    width: 300px;
    height: 120px;
    background: #0f3460;
    border: 2px solid #1a5276;
  }
  /* Default: child is short (red) */
  .c-child {
    width: 100%;
    height: 20px;
    background: #e74c3c;
  }
  /* Container query: when container >= 200px wide, child becomes taller (blue) */
  @container (min-width: 200px) {
    .c-child {
      height: 60px;
      background: #3498db;
    }
  }

  /* --- Narrow container (150px): @container(min-width:200px) does NOT apply --- */
  .c-narrow {
    container-type: size;
    width: 150px;
    height: 120px;
    background: #0f3460;
    border: 2px solid #922b21;
  }

  /* --- Named container --- */
  .c-named {
    container-type: size;
    container-name: sidebar;
    width: 200px;
    height: 120px;
    background: #1a4a1a;
    border: 2px solid #27ae60;
  }
  .c-named-child {
    width: 100%;
    height: 20px;
    background: #e74c3c;
  }
  @container sidebar (min-width: 150px) {
    .c-named-child {
      height: 60px;
      background: #2ecc71;
    }
  }

  /* --- max-width query --- */
  .c-maxw {
    container-type: inline-size;
    width: 120px;
    height: 120px;
    background: #2d2d2d;
    border: 2px solid #d4ac0d;
  }
  .c-maxw-child {
    width: 100%;
    height: 20px;
    background: #e74c3c;
  }
  @container (max-width: 200px) {
    .c-maxw-child {
      height: 60px;
      background: #f1c40f;
    }
  }
</style>
</head>
<body>
<div class="__f">
  <div class="row">
    <!-- Wide container (300px): query applies → blue tall child -->
    <div>
      <div class="c-wide">
        <div class="c-child"></div>
      </div>
    </div>

    <!-- Narrow container (150px): query does NOT apply → red short child -->
    <div>
      <div class="c-narrow">
        <div class="c-child"></div>
      </div>
    </div>

    <!-- Named container: @container sidebar applies → green tall child -->
    <div>
      <div class="c-named">
        <div class="c-named-child"></div>
      </div>
    </div>

    <!-- max-width container: applies → yellow tall child -->
    <div>
      <div class="c-maxw">
        <div class="c-maxw-child"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
