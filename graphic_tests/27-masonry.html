<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lumen — 27 masonry</title>
  <style>
    body {
      background: #ff00ff;
      width: 1024px;
      height: 720px;
      margin: 0;
      padding: 0;
    }
    .__f {
      background: white;
      width: 1022px;
      height: 718px;
      margin: 1px;
      padding: 10px;
      overflow: hidden;
    }
    .masonry-container {
      display: masonry;
      column-count: 3;
      gap: 15px;
      width: 100%;
      height: 600px;
      background: #f5f5f5;
    }
    .item {
      background: #3498db;
      border-radius: 4px;
      break-inside: avoid;
      padding: 10px;
      color: white;
      font-size: 14px;
      text-align: center;
    }
    .item:nth-child(1) { height: 80px; background: #e74c3c; }
    .item:nth-child(2) { height: 120px; background: #2ecc71; }
    .item:nth-child(3) { height: 100px; background: #f39c12; }
    .item:nth-child(4) { height: 90px; background: #9b59b6; }
    .item:nth-child(5) { height: 110px; background: #1abc9c; }
    .item:nth-child(6) { height: 85px; background: #34495e; }
    .item:nth-child(7) { height: 130px; background: #e67e22; }
    .item:nth-child(8) { height: 75px; background: #16a085; }
    .item:nth-child(9) { height: 95px; background: #c0392b; }
  </style>
</head>
<body>
  <div class="__f">
    <h2>Masonry Layout (3 columns)</h2>
    <div class="masonry-container">
      <div class="item">Item 1</div>
      <div class="item">Item 2</div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item">Item 6</div>
      <div class="item">Item 7</div>
      <div class="item">Item 8</div>
      <div class="item">Item 9</div>
    </div>
  </div>
</body>
</html>
