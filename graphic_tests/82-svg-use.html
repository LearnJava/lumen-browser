<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lumen — 82 svg-use element</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff; width: 1024px; height: 720px; }
    .__f {
      background: #1a1a2e;
      width: 1022px; height: 718px;
      margin: 1px;
      padding: 20px;
      overflow: hidden;
    }
    .row { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-start; }
    .label { color: #aaa; font-size: 11px; font-family: sans-serif; margin-top: 4px; }
  </style>
</head>
<body>
<div class="__f">

  <!-- Row 1: basic <use> clone from <defs> -->
  <div class="row">
    <div>
      <svg width="200" height="120" style="display:block; background:#16213e;">
        <defs>
          <rect id="r1" x="0" y="0" width="50" height="35" style="fill:#e74c3c;"/>
        </defs>
        <!-- original shape is in <defs> so invisible; clones appear at (20,20) and (100,60) -->
        <use href="#r1" x="20" y="20"/>
        <use href="#r1" x="100" y="60"/>
      </svg>
      <div class="label">clone from &lt;defs&gt; at two positions</div>
    </div>

    <!-- Row 1b: <use> cloning a circle -->
    <div>
      <svg width="200" height="120" style="display:block; background:#16213e;">
        <defs>
          <circle id="dot" cx="0" cy="0" r="18" style="fill:#3498db; opacity:0.85;"/>
        </defs>
        <use href="#dot" x="40" y="40"/>
        <use href="#dot" x="110" y="40"/>
        <use href="#dot" x="75" y="90"/>
      </svg>
      <div class="label">circle clones (triangle pattern)</div>
    </div>

    <!-- Row 1c: <use> with xlink:href (SVG 1.1 compat) -->
    <div>
      <svg width="200" height="120" style="display:block; background:#16213e;">
        <defs>
          <ellipse id="ell" cx="30" cy="20" rx="28" ry="16" style="fill:#9b59b6;"/>
        </defs>
        <use xlink:href="#ell" x="10" y="10"/>
        <use xlink:href="#ell" x="100" y="70"/>
      </svg>
      <div class="label">xlink:href compatibility</div>
    </div>
  </div>

  <!-- Row 2: <use> referencing a <g> group -->
  <div class="row">
    <div>
      <svg width="280" height="120" style="display:block; background:#16213e;">
        <defs>
          <g id="icon">
            <rect x="0" y="0" width="40" height="30" style="fill:#2ecc71;"/>
            <rect x="5" y="5" width="30" height="20" style="fill:#27ae60;"/>
            <circle cx="20" cy="15" r="6" style="fill:#f1c40f;"/>
          </g>
        </defs>
        <use href="#icon" x="20" y="20"/>
        <use href="#icon" x="110" y="20"/>
        <use href="#icon" x="200" y="20"/>
      </svg>
      <div class="label">&lt;g&gt; group cloned 3×</div>
    </div>

    <!-- Row 2b: <use> referencing a <symbol> -->
    <div>
      <svg width="280" height="120" style="display:block; background:#16213e;">
        <symbol id="star-sym">
          <polygon points="20,5 25,17 38,17 27,25 31,38 20,30 9,38 13,25 2,17 15,17"
                   style="fill:#f39c12; stroke:#e67e22; stroke-width:1;"/>
        </symbol>
        <use href="#star-sym" x="10" y="10"/>
        <use href="#star-sym" x="120" y="10"/>
        <use href="#star-sym" x="230" y="10"/>
      </svg>
      <div class="label">&lt;symbol&gt; cloned 3×</div>
    </div>
  </div>

  <!-- Row 3: <use> with transform attribute on <use> element -->
  <div class="row">
    <div>
      <svg width="460" height="130" style="display:block; background:#16213e;">
        <defs>
          <rect id="tile" x="0" y="0" width="40" height="40"
                style="fill:#1abc9c; stroke:#16a085; stroke-width:2;"/>
        </defs>
        <!-- 5 clones with x offset only -->
        <use href="#tile" x="10"  y="20"/>
        <use href="#tile" x="60"  y="20"/>
        <use href="#tile" x="110" y="20"/>
        <use href="#tile" x="160" y="20"/>
        <use href="#tile" x="210" y="20"/>
        <!-- 5 smaller clones using transform="" -->
        <use href="#tile" x="270" y="20" transform="scale(0.75)"/>
        <use href="#tile" x="302" y="20" transform="scale(0.75)"/>
        <use href="#tile" x="334" y="20" transform="scale(0.75)"/>
        <use href="#tile" x="366" y="20" transform="scale(0.75)"/>
        <use href="#tile" x="398" y="20" transform="scale(0.75)"/>
      </svg>
      <div class="label">tile row via x offset; scaled row via transform</div>
    </div>
  </div>

  <!-- Row 4: nested SVG <use> chains (non-cyclic) -->
  <div class="row">
    <div>
      <svg width="460" height="130" style="display:block; background:#16213e;">
        <defs>
          <circle id="base-c" cx="20" cy="20" r="15" style="fill:#e74c3c;"/>
          <!-- g2 uses base-c (chain depth 2) -->
          <g id="g2">
            <use href="#base-c"/>
            <use href="#base-c" x="45"/>
          </g>
        </defs>
        <!-- <use> targeting g2 which itself contains <use> targeting base-c -->
        <use href="#g2" x="10" y="10"/>
        <use href="#g2" x="130" y="10"/>
        <use href="#g2" x="250" y="10"/>
      </svg>
      <div class="label">nested &lt;use&gt; chain (use → g containing use)</div>
    </div>
  </div>

</div>
</body>
</html>
