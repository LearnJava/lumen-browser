<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 02 color formats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; width: 1024px; height: 720px; padding: 24px; }
    .sw { display: inline-block; width: 200px; height: 100px; margin: 0 16px 16px 0; }
  </style>
</head>
<body>
  <!-- named -->
  <div class="sw" style="background: tomato;"></div>
  <!-- #RGB -->
  <div class="sw" style="background: #0af;"></div>
  <!-- #RRGGBB -->
  <div class="sw" style="background: #3182ce;"></div>

  <!-- #RGBA (semi-transparent red over white → pink) -->
  <div class="sw" style="background: #e53e3e80;"></div>
  <!-- #RRGGBBAA (semi-transparent green over white → pale green) -->
  <div class="sw" style="background: #38a16980;"></div>
  <!-- rgb() -->
  <div class="sw" style="background: rgb(128, 0, 128);"></div>

  <!-- rgba() -->
  <div class="sw" style="background: rgba(214, 158, 46, 0.8);"></div>
  <!-- hsl() -->
  <div class="sw" style="background: hsl(200, 100%, 40%);"></div>
  <!-- hsla() -->
  <div class="sw" style="background: hsla(300, 70%, 50%, 0.7);"></div>
</body>
</html>
