<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 18 object-fit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a202c; width: 1024px; height: 720px; padding: 24px; }
    .cell { display: inline-block; vertical-align: top; margin: 0 16px 32px 0; }
    .box { width: 180px; height: 120px;
           background: repeating-linear-gradient(45deg, #2d3748 0, #2d3748 4px, #1a202c 4px, #1a202c 8px);
           border: 1px solid #4a5568; }
    .box img { display: block; width: 180px; height: 120px; }
  </style>
</head>
<body>
  <!-- object-fit: 5 modes with perceptron.png (landscape image in landscape box) -->
  <div class="cell">
    <div class="box"><img src="../samples/images/perceptron.png" style="object-fit: fill;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/perceptron.png" style="object-fit: contain;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/perceptron.png" style="object-fit: cover;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/perceptron.png" style="object-fit: none;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/perceptron.png" style="object-fit: scale-down;" alt=""></div>
  </div>

  <!-- object-position variants with cover -->
  <div class="cell">
    <div class="box"><img src="../samples/images/agi_illustration.png"
      style="object-fit: cover; object-position: left top;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/agi_illustration.png"
      style="object-fit: cover; object-position: center;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/agi_illustration.png"
      style="object-fit: cover; object-position: right bottom;" alt=""></div>
  </div>
  <div class="cell">
    <div class="box"><img src="../samples/images/agi_illustration.png"
      style="object-fit: cover; object-position: 25% 75%;" alt=""></div>
  </div>
</body>
</html>
