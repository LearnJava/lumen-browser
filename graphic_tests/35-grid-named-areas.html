<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lumen — 35 grid named areas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
    .__f { background: #f7fafc; width: 1022px; height: 718px; margin: 1px; padding: 24px; overflow: hidden; }

    /* Layout: 2-column page layout via named areas */
    .layout {
      display: grid;
      grid-template-columns: 200px 760px;
      grid-template-rows: 60px 500px 60px;
      grid-template-areas:
        "header  header"
        "sidebar main"
        "footer  footer";
      width: 960px;
      gap: 4px;
    }
    .header  { grid-area: header;  background: #3182ce; }
    .sidebar { grid-area: sidebar; background: #38a169; }
    .main    { grid-area: main;    background: #e53e3e; }
    .footer  { grid-area: footer;  background: #805ad5; }

    /* Nested 3-area grid */
    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 40px 40px;
      grid-template-areas: "a b c" "a d e";
      width: 300px;
      gap: 2px;
      margin-top: 8px;
    }
    .mini-a { grid-area: a; background: #dd6b20; }
    .mini-b { grid-area: b; background: #d53f8c; }
    .mini-c { grid-area: c; background: #319795; }
    .mini-d { grid-area: d; background: #2b6cb0; }
    .mini-e { grid-area: e; background: #276749; }

    /* Dense auto-flow: items fill gaps (5-col, span items leave holes that 1×1s fill) */
    .dense-grid {
      display: grid;
      grid-template-columns: repeat(5, 90px);
      grid-auto-rows: 50px;
      grid-auto-flow: row dense;
      width: 450px;
      gap: 3px;
      margin-top: 8px;
    }
    .dg-span2 { grid-column: span 2; }
    .dg-span3 { grid-column: span 3; }
    .dg-1 { background: #3182ce; }
    .dg-2 { background: #e53e3e; }
    .dg-3 { background: #38a169; }
    .dg-4 { background: #805ad5; }
    .dg-5 { background: #dd6b20; }
    .dg-6 { background: #d53f8c; }
  </style>
</head>
<body>
  <div class="__f">
    <!-- Page layout with named areas -->
    <div class="layout">
      <div class="header"></div>
      <div class="sidebar"></div>
      <div class="main"></div>
      <div class="footer"></div>
    </div>
    <!-- Small grid with a spanning area (a spans both rows) -->
    <div class="mini-grid">
      <div class="mini-a"></div>
      <div class="mini-b"></div>
      <div class="mini-c"></div>
      <div class="mini-d"></div>
      <div class="mini-e"></div>
    </div>
    <!-- Dense auto-flow: span-2, span-3, and 1x1 items fill gaps -->
    <div class="dense-grid">
      <div class="dg-1 dg-span2"></div>
      <div class="dg-2 dg-span3"></div>
      <div class="dg-3"></div>
      <div class="dg-4"></div>
      <div class="dg-5 dg-span2"></div>
      <div class="dg-6"></div>
    </div>
  </div>
</body>
</html>
