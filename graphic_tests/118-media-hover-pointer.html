<!DOCTYPE html>
<!-- Media Queries L4 §5.3-5.6 — hover / any-hover / pointer / any-pointer.
     On a desktop with a mouse, the primary pointer is fine and hover-capable, so
     `(hover: hover)`, `(any-hover: hover)`, `(pointer: fine)`, `(any-pointer: fine)`
     all match, while `(hover: none)` and `(pointer: coarse)` do not. Each swatch
     starts red and is turned green only when its media query matches. On a correct
     desktop engine all four "match" swatches are green and both "no-match" swatches
     stay red. Graphics only, no text. -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; padding: 0; }
  .__f { background: #ffffff; width: 1022px; height: 718px; margin: 1px; padding: 40px; overflow: hidden; box-sizing: border-box; }

  .row { display: flex; gap: 24px; margin-bottom: 24px; }
  .sw {
    width: 200px;
    height: 140px;
    background: #d64545;        /* default: red = query did NOT match */
    border: 6px solid #1a202c;
    box-sizing: border-box;
  }

  /* Desktop matches → green */
  @media (hover: hover)        { .a { background: #2f855a; } }
  @media (any-hover: hover)    { .b { background: #2f855a; } }
  @media (pointer: fine)       { .c { background: #2f855a; } }
  @media (any-pointer: fine)   { .d { background: #2f855a; } }

  /* Desktop does NOT match → swatch stays red, but we paint it blue if it wrongly matches */
  @media (hover: none)         { .e { background: #2b6cb0; } }
  @media (pointer: coarse)     { .f { background: #2b6cb0; } }
</style>
</head>
<body>
<div class="__f">
  <div class="row">
    <div class="sw a"></div>
    <div class="sw b"></div>
    <div class="sw c"></div>
  </div>
  <div class="row">
    <div class="sw d"></div>
    <div class="sw e"></div>
    <div class="sw f"></div>
  </div>
</div>
</body>
</html>
