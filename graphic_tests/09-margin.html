<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 08 margin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff;  width: 1024px; height: 720px; overflow: hidden;  }
    /* Section 1: margin-left staircase */
    .step { width: 400px; height: 36px; background: #3182ce; margin-bottom: 6px; }
    .sep { height: 32px; }
    /* Section 2: margin-top gap between consecutive blocks */
    .gap-block { width: 320px; height: 28px; }
    .__f { background: #f7fafc; width: 1022px; height: 718px; margin: 1px; padding: 24px; overflow: hidden; }
  </style>
</head>
<body>
  <div class="__f">
  <!-- margin-left stepping: 0 / 24 / 48 / 96 / 192 px -->
  <div class="step" style="margin-left: 0px;"></div>
  <div class="step" style="margin-left: 24px;"></div>
  <div class="step" style="margin-left: 48px;"></div>
  <div class="step" style="margin-left: 96px;"></div>
  <div class="step" style="margin-left: 192px;"></div>

  <div class="sep"></div>

  <!-- margin-top gap between blocks: 4 / 8 / 16 / 32 / 64 px -->
  <div class="gap-block" style="background: #e53e3e;"></div>
  <div class="gap-block" style="background: #38a169; margin-top: 4px;"></div>
  <div class="gap-block" style="background: #e53e3e; margin-top: 8px;"></div>
  <div class="gap-block" style="background: #38a169; margin-top: 16px;"></div>
  <div class="gap-block" style="background: #e53e3e; margin-top: 32px;"></div>
  <div class="gap-block" style="background: #38a169; margin-top: 64px;"></div>
  </div>
</body>
</html>
