<!DOCTYPE html>
<!-- CSS Images L4 §3.1 — gradient <color-interpolation-method> (`in <space>`).
     Each strip is the SAME red→blue horizontal linear-gradient interpolated in a
     different colour space. Edge interpolates continuously in the space; Lumen
     approximates by subdividing the stop list (computed via color-mix maths) and
     letting the renderer lerp the dense stops in sRGB. Spaces shown are all
     rectangular / index-0-hue (srgb, srgb-linear, oklab, lab, hsl) — these are
     correct in Lumen. Lab-based polar spaces (oklch/lch) are excluded pending
     BUG-154 (mix_polar hue-index). The midpoints differ markedly per space:
     srgb ≈ rgb(127,0,127); srgb-linear ≈ rgb(187,0,187); oklab ≈ rgb(140,83,162);
     lab ≈ rgb(192,0,136); hsl = rgb(255,0,255). -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; }
  .__f {
    background: #ffffff; width: 1022px; height: 718px; margin: 1px;
    overflow: hidden; box-sizing: border-box;
    display: flex; flex-direction: column; gap: 6px; padding: 6px;
  }
  .strip { width: 100%; height: 134px; }

  .s-srgb     { background: linear-gradient(to right in srgb,        red, blue); }
  .s-srgblin  { background: linear-gradient(to right in srgb-linear, red, blue); }
  .s-oklab    { background: linear-gradient(to right in oklab,       red, blue); }
  .s-lab      { background: linear-gradient(to right in lab,         red, blue); }
  .s-hsl      { background: linear-gradient(to right in hsl,         red, blue); }
</style>
</head>
<body>
<div class="__f">
  <div class="strip s-srgb"></div>
  <div class="strip s-srgblin"></div>
  <div class="strip s-oklab"></div>
  <div class="strip s-lab"></div>
  <div class="strip s-hsl"></div>
</div>
</body>
</html>
