<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lumen — 101 border-radius + overflow clip interaction</title>
<style>
  /* Interaction test: border-radius (TEST-36) × overflow:hidden (TEST-14).
     overflow:hidden on a rounded box must clip children to the ROUNDED
     border box, not the rectangular one. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
  .__f { background: #1a202c; width: 1022px; height: 718px; margin: 1px; overflow: hidden; position: relative; }

  .cell { position: absolute; width: 300px; height: 300px; }
  .c0 { left: 24px;  top: 24px; }
  .c1 { left: 364px; top: 24px; }
  .c2 { left: 704px; top: 24px; }
  .c3 { left: 24px;  top: 374px; }
  .c4 { left: 364px; top: 374px; }
  .c5 { left: 704px; top: 374px; }
</style>
</head>
<body>
<div class="__f">

  <!-- c0: rounded container clips a full-width child bar — its top corners must be cut -->
  <div class="cell c0" style="background:#2b6cb0;border-radius:60px;overflow:hidden;">
    <div style="width:300px;height:100px;background:#f6e05e;"></div>
  </div>

  <!-- c1: circle container (radius 50%) clips a full-size square child into a circle -->
  <div class="cell c1" style="background:#2d3748;border-radius:50%;overflow:hidden;">
    <div style="width:300px;height:300px;background:#fc8181;"></div>
  </div>

  <!-- c2: CONTROL — same radius, overflow:visible: child bar keeps square corners -->
  <div class="cell c2" style="background:#2b6cb0;border-radius:60px;">
    <div style="width:300px;height:100px;background:#f6e05e;"></div>
  </div>

  <!-- c3: nested rounded clips — inner box has its own radius and border -->
  <div class="cell c3" style="background:#2f855a;border-radius:40px;overflow:hidden;">
    <div style="width:220px;height:220px;margin:40px;background:#9ae6b4;border-radius:20px;border:6px solid #22543d;"></div>
  </div>

  <!-- c4: radius + thick border + overflow — child clipped inside the padding edge curve -->
  <div class="cell c4" style="background:#553c9a;border-radius:50px;border:10px solid #d6bcfa;overflow:hidden;">
    <div style="width:300px;height:90px;background:#ed8936;"></div>
  </div>

  <!-- c5: pill container clips a wide child bar to a stadium shape -->
  <div class="cell c5" style="height:140px;top:454px;background:#2d3748;border-radius:999px;overflow:hidden;">
    <div style="width:340px;height:140px;margin-left:-20px;background:#4fd1c5;"></div>
  </div>

</div>
</body>
</html>
