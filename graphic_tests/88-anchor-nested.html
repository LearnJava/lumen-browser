<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST-88: anchor-name in nested elements</title>
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; }
  .__f { background: white; width: 1022px; height: 718px; margin: 1px; padding: 0; overflow: hidden; }

  .container { position: absolute; top: 50px; left: 100px; width: 300px; height: 300px; background: #F5F5F5; padding: 20px; }
  .nested-anchor { anchor-name: --nested; width: 60px; height: 60px; background: #673AB7; margin: 20px; }
  .indicator { position-anchor: --nested; width: 100px; height: 40px; background: #3F51B5; position: absolute; top: 450px; left: 400px; }
</style>
</head>
<body>
<div class="__f">
  <div class="container">
    <div class="nested-anchor"></div>
  </div>
  <div class="indicator"></div>
</div>
</body>
</html>
