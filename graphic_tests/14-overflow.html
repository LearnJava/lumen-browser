<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 13 overflow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a202c; width: 1024px; height: 720px; padding: 24px; }
    /* each demo lives in a 460px column so overflow doesn't bleed into the next demo */
    .col { display: inline-block; width: 460px; vertical-align: top; margin-bottom: 40px; }
    /* container box */
    .ct { width: 160px; height: 100px; background: #2d3748; }
    /* overflowing child (larger than container) */
    .ch { width: 220px; height: 140px; }
      .__m { width: 1024px; height: 1px; background: #ff00ff; }
  </style>
</head>
<body>
  <div class="__m"></div>
  <!-- overflow: visible (default) — child bleeds right and down -->
  <div class="col">
    <div class="ct" style="overflow: visible;">
      <div class="ch" style="background: rgba(229,62,62,0.85);"></div>
    </div>
  </div>

  <!-- overflow: hidden — child clipped to container -->
  <div class="col">
    <div class="ct" style="overflow: hidden;">
      <div class="ch" style="background: rgba(49,130,206,0.85);"></div>
    </div>
  </div>

  <!-- overflow-x: hidden, overflow-y: visible — clipped right, bleeds down -->
  <div class="col">
    <div class="ct" style="overflow-x: hidden; overflow-y: visible;">
      <div class="ch" style="background: rgba(56,161,105,0.85);"></div>
    </div>
  </div>

  <!-- overflow-x: visible, overflow-y: hidden — bleeds right, clipped below -->
  <div class="col">
    <div class="ct" style="overflow-x: visible; overflow-y: hidden;">
      <div class="ch" style="background: rgba(128,90,213,0.85);"></div>
    </div>
  </div>
</body>
</html>
