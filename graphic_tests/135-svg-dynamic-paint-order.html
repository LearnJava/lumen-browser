<!DOCTYPE html>
<!-- TEST-135 — dynamic SVG (createElementNS), no text: document-order paint / z-stack.
     Later siblings paint over earlier ones; the exact overlap geometry must match Edge.
     Solid opaque fills → crisp edges, holds ≤0.5%. -->
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #ff00ff; width: 1024px; height: 720px; }
  .__f { background: #0d1117; width: 1022px; height: 718px; margin: 1px; padding: 0; overflow: hidden; }
  #g { display: block; width: 1022px; height: 718px; }
</style>
</head>
<body>
  <div class="__f"><svg id="g"></svg></div>
<script>
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('g');
  function s(tag, a) {
    const e = document.createElementNS(NS, tag);
    for (const k in (a || {})) e.setAttribute(k, a[k]);
    return e;
  }
  svg.setAttribute('viewBox', '0 0 1022 718');
  svg.appendChild(s('rect', { x: 0, y: 0, width: 1022, height: 718, fill: '#0d1117' }));

  const COLS = ['#1f6feb', '#238636', '#8957e5', '#9e6a03', '#1f9e9e', '#a83254', '#f0883e', '#58a6ff'];

  // Cascading overlapped squares (each later one covers the previous bottom-right).
  for (let i = 0; i < 12; i++) {
    svg.appendChild(s('rect', { x: 60 + i * 26, y: 60 + i * 26, width: 170, height: 170, fill: COLS[i % COLS.length] }));
  }

  // Overlapping circles forming a chain — later on top.
  for (let i = 0; i < 10; i++) {
    svg.appendChild(s('circle', { cx: 560 + i * 42, cy: 160, r: 60, fill: COLS[(i + 3) % COLS.length] }));
  }

  // Interleaved bars: vertical set then horizontal set drawn over them (grid weave look).
  for (let i = 0; i < 10; i++) {
    svg.appendChild(s('rect', { x: 80 + i * 40, y: 400, width: 22, height: 280, fill: '#30363d' }));
  }
  for (let j = 0; j < 7; j++) {
    svg.appendChild(s('rect', { x: 70, y: 410 + j * 40, width: 400, height: 22, fill: '#7ee787' }));
  }

  // A "stack of cards" fanned by overlapping rotated rects (rotate about own centre).
  for (let i = 0; i < 7; i++) {
    const cx = 740, cy = 540, ang = -36 + i * 12;
    svg.appendChild(s('rect', {
      x: cx - 50, y: cy - 90, width: 100, height: 160, rx: 8,
      fill: COLS[i % COLS.length], transform: `rotate(${ang} ${cx} ${cy})`
    }));
  }
</script>
</body>
</html>
