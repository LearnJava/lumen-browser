<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; padding: 0; }
  .__f {
    background: #1a1a2e;
    width: 1022px; height: 718px;
    margin: 1px; padding: 40px;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* Grid of test boxes */
  .row {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    align-items: center;
  }

  .box {
    width: 80px;
    height: 80px;
    background: #e94560;
    flex-shrink: 0;
  }

  /* CSS Transforms L2 individual properties */
  .t-translate {
    translate: 20px 10px;
  }
  .t-rotate {
    rotate: 45deg;
  }
  .t-scale-uniform {
    scale: 1.4;
  }
  .t-scale-xy {
    scale: 1.6 0.7;
  }
  .t-translate-only-x {
    translate: 30px;
  }
  .t-all-three {
    translate: 10px -10px;
    rotate: 30deg;
    scale: 1.2;
  }
  /* Combined with transform — order: translate × rotate × scale × transform */
  .t-individual-plus-transform {
    translate: 15px 0px;
    scale: 0.9;
    transform: rotate(15deg);
  }

  /* Reference boxes (no individual props) */
  .ref {
    background: #0f3460;
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }
  /* Same effect using transform shorthand for comparison */
  .ref-translate { transform: translate(20px, 10px); background: #16213e; }
  .ref-rotate    { transform: rotate(45deg); background: #16213e; }
  .ref-scale     { transform: scale(1.4); background: #16213e; }

  /* Labels */
  .label {
    color: #a8dadc;
    font-size: 13px;
    font-family: monospace;
    min-width: 200px;
  }
</style>
</head>
<body>
<div class="__f">

  <div class="row">
    <div class="box t-translate"></div>
    <div class="label">translate: 20px 10px</div>
    <div class="box ref-translate"></div>
    <div class="label">transform: translate(20px,10px)</div>
  </div>

  <div class="row">
    <div class="box t-rotate"></div>
    <div class="label">rotate: 45deg</div>
    <div class="box ref-rotate"></div>
    <div class="label">transform: rotate(45deg)</div>
  </div>

  <div class="row">
    <div class="box t-scale-uniform"></div>
    <div class="label">scale: 1.4</div>
    <div class="box ref-scale"></div>
    <div class="label">transform: scale(1.4)</div>
  </div>

  <div class="row">
    <div class="box t-scale-xy"></div>
    <div class="label">scale: 1.6 0.7</div>
    <div class="box t-translate-only-x" style="background:#457b9d;"></div>
    <div class="label">translate: 30px</div>
  </div>

  <div class="row">
    <div class="box t-all-three" style="background:#e63946;"></div>
    <div class="label">translate+rotate+scale combined</div>
    <div class="box t-individual-plus-transform" style="background:#2a9d8f;"></div>
    <div class="label">individual + transform:</div>
  </div>

</div>
</body>
</html>
