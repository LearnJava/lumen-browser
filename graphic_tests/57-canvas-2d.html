<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lumen — 57 canvas 2d</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
    .__f { background: #0f172a; width: 1022px; height: 718px; margin: 1px; padding: 24px; overflow: hidden; }
    .row { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
    .label { color: #e2e8f0; font-size: 11px; margin-top: 4px; text-align: center; font-family: sans-serif; }
    /* CSS background/border on the canvas element box itself renders even
       without JS (the canvas bitmap is layered on top via getContext). */
    canvas { background: #1e293b; }
  </style>
</head>
<body>
  <div class="__f">

    <!-- row 1: default UA size + explicit attribute sizes -->
    <div class="row">
      <div>
        <canvas id="c1"></canvas>
        <div class="label">300×150 (UA default)</div>
      </div>
      <div>
        <canvas id="c2" width="200" height="150"></canvas>
        <div class="label">200×150 (attr)</div>
      </div>
      <div>
        <canvas id="c3" width="180" height="150"
                style="border: 3px solid #38bdf8;"></canvas>
        <div class="label">180×150 + border</div>
      </div>
    </div>

    <!-- row 2: drawing operations -->
    <div class="row">
      <div>
        <canvas id="c4" width="200" height="160"></canvas>
        <div class="label">fillRect + arc</div>
      </div>
      <div>
        <canvas id="c5" width="200" height="160"></canvas>
        <div class="label">path triangle</div>
      </div>
      <div>
        <canvas id="c6" width="200" height="160"
                style="border-radius: 10px;"></canvas>
        <div class="label">strokeRect + radius</div>
      </div>
    </div>

  </div>

  <script>
    // c1: default-size canvas, two filled rects.
    (function () {
      var ctx = document.getElementById('c1').getContext('2d');
      ctx.fillStyle = '#f97316';
      ctx.fillRect(20, 20, 120, 50);
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(160, 80, 120, 50);
    })();

    // c2: green rectangle covering most of the canvas.
    (function () {
      var ctx = document.getElementById('c2').getContext('2d');
      ctx.fillStyle = '#10b981';
      ctx.fillRect(10, 10, 180, 130);
    })();

    // c3: red rectangle inside the bordered canvas.
    (function () {
      var ctx = document.getElementById('c3').getContext('2d');
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(20, 20, 140, 110);
    })();

    // c4: filled rect + an arc (full circle) on top.
    (function () {
      var ctx = document.getElementById('c4').getContext('2d');
      ctx.fillStyle = '#6366f1';
      ctx.fillRect(10, 10, 180, 140);
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(100, 80, 50, 0, Math.PI * 2, false);
      ctx.fill();
    })();

    // c5: filled triangle via path.
    (function () {
      var ctx = document.getElementById('c5').getContext('2d');
      ctx.fillStyle = '#ec4899';
      ctx.beginPath();
      ctx.moveTo(100, 20);
      ctx.lineTo(180, 140);
      ctx.lineTo(20, 140);
      ctx.closePath();
      ctx.fill();
    })();

    // c6: stroked rectangle outline.
    (function () {
      var ctx = document.getElementById('c6').getContext('2d');
      ctx.fillStyle = '#0ea5e9';
      ctx.fillRect(0, 0, 200, 160);
      ctx.strokeStyle = '#fef08a';
      ctx.lineWidth = 6;
      ctx.strokeRect(25, 25, 150, 110);
    })();
  </script>
</body>
</html>
