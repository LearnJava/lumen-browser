<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TEST-51: Scrollbar rendering</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ff00ff; width: 1024px; height: 720px; }
  .__f {
    background: #1a1a2e;
    width: 1022px; height: 718px;
    margin: 1px;
    padding: 20px;
    overflow: hidden;
  }
  h2 { color: #e2e2f0; font-size: 16px; margin-bottom: 12px; font-family: sans-serif; }

  /* Vertical scrollbar demo */
  .scroll-v {
    width: 180px; height: 120px;
    overflow-y: scroll;
    overflow-x: hidden;
    background: #16213e;
    border: 2px solid #0f3460;
    float: left;
    margin-right: 24px;
  }
  .scroll-v-content {
    width: 100%;
    height: 320px;
    background: linear-gradient(to bottom, #533483, #e94560, #533483);
  }

  /* Horizontal scrollbar demo */
  .scroll-h {
    width: 300px; height: 80px;
    overflow-x: scroll;
    overflow-y: hidden;
    background: #16213e;
    border: 2px solid #0f3460;
    clear: left;
    margin-top: 20px;
  }
  .scroll-h-content {
    width: 700px; height: 100%;
    background: linear-gradient(to right, #533483, #e94560, #0f3460, #533483);
  }

  /* Both axes scrollbar */
  .scroll-both {
    width: 200px; height: 120px;
    overflow: scroll;
    background: #16213e;
    border: 2px solid #0f3460;
    float: left;
    margin-right: 24px;
    margin-top: 20px;
  }
  .scroll-both-content {
    width: 500px; height: 300px;
    background: radial-gradient(circle at 50% 50%, #e94560 0%, #533483 50%, #0f3460 100%);
  }

  /* No-overflow: overflow:scroll but content fits → no scrollbar visible */
  .scroll-nooverflow {
    width: 200px; height: 120px;
    overflow: scroll;
    background: #16213e;
    border: 2px solid #0f3460;
    float: left;
    margin-top: 20px;
  }
  .scroll-nooverflow-content {
    width: 160px; height: 80px;
    background: #533483;
  }

  .label {
    color: #a0a0c0;
    font-family: sans-serif;
    font-size: 11px;
    margin-top: 4px;
    margin-bottom: 12px;
    clear: both;
  }
  .row { overflow: hidden; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="__f">
  <h2>Scrollbar rendering — overflow:scroll/auto</h2>
  <div class="row">
    <div class="scroll-v"></div>
    <div style="float:left">
      <div class="scroll-both"></div>
      <div class="scroll-nooverflow"></div>
    </div>
  </div>
  <div class="scroll-v-content" style="display:none"></div>
  <div style="overflow:hidden; clear:both; height:0"></div>

  <!-- Vertical scroll container with actual children -->
  <div style="float:left; width:180px; height:120px; overflow-y:scroll; overflow-x:hidden; background:#16213e; border:2px solid #0f3460; margin-right:24px;">
    <div style="width:100%; height:80px; background:#533483; margin-bottom:4px;"></div>
    <div style="width:100%; height:80px; background:#e94560; margin-bottom:4px;"></div>
    <div style="width:100%; height:80px; background:#0f3460;"></div>
  </div>

  <!-- Horizontal scroll container -->
  <div style="float:left; width:300px; height:80px; overflow-x:scroll; overflow-y:hidden; background:#16213e; border:2px solid #0f3460; margin-top:0;">
    <div style="display:inline-block; width:180px; height:60px; background:#533483; margin:10px 4px 0 4px; vertical-align:top;"></div>
    <div style="display:inline-block; width:180px; height:60px; background:#e94560; margin:10px 4px 0 4px; vertical-align:top;"></div>
    <div style="display:inline-block; width:180px; height:60px; background:#0f3460; margin:10px 4px 0 4px; vertical-align:top;"></div>
  </div>
</div>
</body>
</html>
