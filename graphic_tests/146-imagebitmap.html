<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lumen — 146 createImageBitmap + bitmaprenderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
    .__f { background: #0f172a; width: 1022px; height: 718px; margin: 1px; padding: 24px; overflow: hidden; }
    .row { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
    canvas { background: #1e293b; }
  </style>
</head>
<body>
  <div class="__f">

    <!-- row 1: draw a pattern, snapshot it through ImageData, present it on a
         second canvas via ImageBitmapRenderingContext. c1 and c2 must match. -->
    <div class="row">
      <canvas id="src" width="160" height="120"></canvas>
      <canvas id="dst" width="160" height="120"></canvas>
      <canvas id="dst-crop" width="80" height="60"></canvas>
    </div>

    <!-- row 2: createImageBitmap(OffscreenCanvas) must not detach the source —
         draw again on the same OffscreenCanvas after taking a bitmap from it. -->
    <div class="row">
      <canvas id="oc-before" width="160" height="120"></canvas>
      <canvas id="oc-after" width="160" height="120"></canvas>
    </div>

  </div>

  <script>
    // Draw a simple two-tone pattern (orange rect + green circle) on `src`.
    var srcCtx = document.getElementById('src').getContext('2d');
    srcCtx.fillStyle = '#0f172a';
    srcCtx.fillRect(0, 0, 160, 120);
    srcCtx.fillStyle = '#f97316';
    srcCtx.fillRect(10, 10, 70, 50);
    srcCtx.fillStyle = '#22c55e';
    srcCtx.beginPath();
    srcCtx.arc(110, 70, 35, 0, Math.PI * 2, false);
    srcCtx.fill();

    // Full transfer: ImageData → createImageBitmap → bitmaprenderer.
    createImageBitmap(srcCtx.getImageData(0, 0, 160, 120)).then(function (bitmap) {
      var dstCtx = document.getElementById('dst').getContext('bitmaprenderer');
      dstCtx.transferFromImageBitmap(bitmap);
    });

    // Cropped transfer: same source ImageData, sub-rectangle (40,30,80,60).
    createImageBitmap(srcCtx.getImageData(0, 0, 160, 120), 40, 30, 80, 60).then(function (bitmap) {
      var cropCtx = document.getElementById('dst-crop').getContext('bitmaprenderer');
      cropCtx.transferFromImageBitmap(bitmap);
    });

    // createImageBitmap(OffscreenCanvas) must snapshot without detaching the source.
    var oc = new OffscreenCanvas(160, 120);
    var octx = oc.getContext('2d');
    octx.fillStyle = '#0f172a';
    octx.fillRect(0, 0, 160, 120);
    octx.fillStyle = '#38bdf8';
    octx.fillRect(20, 20, 120, 80);

    createImageBitmap(oc).then(function (bitmap) {
      var beforeCtx = document.getElementById('oc-before').getContext('bitmaprenderer');
      beforeCtx.transferFromImageBitmap(bitmap);

      // The OffscreenCanvas must still be usable — draw again and present via
      // the regular OffscreenCanvas → ImageData → bitmaprenderer round trip.
      octx.fillStyle = '#ef4444';
      octx.fillRect(60, 40, 60, 40);
      createImageBitmap(oc).then(function (bitmap2) {
        var afterCtx = document.getElementById('oc-after').getContext('bitmaprenderer');
        afterCtx.transferFromImageBitmap(bitmap2);
      });
    });
  </script>
</body>
</html>
