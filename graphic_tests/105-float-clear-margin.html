<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lumen — 105 float + clear + margin interaction</title>
<style>
  /* Interaction test: float/clear (TEST-37) × margins (TEST-09).
     Floats with margins, clearance distance, float wrapping in a narrow
     container, and in-flow blocks flowing beside floats. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
  .__f { background: #1a202c; width: 1022px; height: 718px; margin: 1px; overflow: hidden; position: relative; }

  .cell { position: absolute; width: 300px; height: 300px; background: #2d3748; overflow: hidden; }
  .c0 { left: 24px;  top: 24px; }
  .c1 { left: 364px; top: 24px; }
  .c2 { left: 704px; top: 24px; }
  .c3 { left: 24px;  top: 374px; }
  .c4 { left: 364px; top: 374px; }
  .c5 { left: 704px; top: 374px; }

  .fl { float: left; }
  .fr { float: right; }
</style>
</head>
<body>
<div class="__f">

  <!-- c0: two left floats with margins stack horizontally, gap = sum of margins -->
  <div class="cell c0">
    <div class="fl" style="width:100px;height:100px;margin:10px;background:#4299e1;"></div>
    <div class="fl" style="width:100px;height:100px;margin:10px;background:#48bb78;"></div>
  </div>

  <!-- c1: float left + float right + an in-flow block fills the middle strip -->
  <div class="cell c1">
    <div class="fl" style="width:90px;height:120px;background:#e53e3e;"></div>
    <div class="fr" style="width:90px;height:120px;background:#9f7aea;"></div>
    <div style="height:60px;margin:0 100px;background:#f6e05e;"></div>
  </div>

  <!-- c2: clear:both + margin-top — clearance first, THEN the margin applies -->
  <div class="cell c2">
    <div class="fl" style="width:120px;height:120px;background:#ed8936;"></div>
    <div style="clear:both;margin-top:30px;height:80px;background:#4fd1c5;"></div>
  </div>

  <!-- c3: three floats wrap to the next line in a 300px-wide container -->
  <div class="cell c3">
    <div class="fl" style="width:130px;height:90px;margin:8px;background:#4299e1;"></div>
    <div class="fl" style="width:130px;height:90px;margin:8px;background:#48bb78;"></div>
    <div class="fl" style="width:130px;height:90px;margin:8px;background:#fc8181;"></div>
  </div>

  <!-- c4: float taller than the in-flow sibling — sibling's background extends
       under the float, content area is beside it -->
  <div class="cell c4">
    <div class="fl" style="width:110px;height:220px;background:#553c9a;"></div>
    <div style="height:100px;background:#d6bcfa;"></div>
  </div>

  <!-- c5: CONTROL — plain in-flow blocks with margins (no floats) stack vertically -->
  <div class="cell c5">
    <div style="width:100px;height:100px;margin:10px;background:#4299e1;"></div>
    <div style="width:100px;height:100px;margin:10px;background:#48bb78;"></div>
  </div>

</div>
</body>
</html>
