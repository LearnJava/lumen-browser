<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 00 calibration</title>
  <style>
    /* Калибровочный тест: 1024×720 viewport с магента-рамкой 1px по всему периметру.
       Workflow находит магента-пиксели в desktop-снимке Lumen → знает точные координаты
       всех 4 сторон content-area → передаёт crop offset во все следующие тесты.
       Если этот тест не проходит — pipeline останавливается. */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1024px; height: 720px; overflow: hidden; }
    body { background: #ff00ff; }
    .inner { width: 1022px; height: 718px; margin: 1px; background: #000000; }
  </style>
</head>
<body>
  <div class="inner"></div>
</body>
</html>
