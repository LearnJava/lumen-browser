<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 05 border sides</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a202c; width: 1024px; height: 720px; padding: 24px; }
    .b { display: inline-block; width: 160px; height: 80px; margin: 0 16px 32px 0;
         background: #2d3748; }
  </style>
</head>
<body>
  <!-- single side only -->
  <div class="b" style="border-top: 6px solid #fc8181;"></div>
  <div class="b" style="border-right: 6px solid #68d391;"></div>
  <div class="b" style="border-bottom: 6px solid #63b3ed;"></div>
  <div class="b" style="border-left: 6px solid #f6e05e;"></div>

  <!-- all 4 sides, each a different color -->
  <div class="b" style="border-top: 4px solid #fc8181; border-right: 4px solid #f6e05e;
                         border-bottom: 4px solid #68d391; border-left: 4px solid #63b3ed;"></div>

  <!-- mixed widths — thin vs thick alternating -->
  <div class="b" style="border-top: 12px solid #fc8181; border-right: 3px solid #f6e05e;
                         border-bottom: 12px solid #68d391; border-left: 3px solid #63b3ed;"></div>

  <!-- currentColor — border inherits element's color -->
  <div class="b" style="color: #ed8936; border: 5px solid;"></div>
  <div class="b" style="color: #b794f4; border: 5px solid;"></div>

  <!-- combination: border + padding visible as nested layers -->
  <div class="b" style="border: 8px solid #63b3ed; padding: 12px; width: 200px; height: 100px;">
    <div style="background: #4a5568; width: 100%; height: 100%;"></div>
  </div>
</body>
</html>
