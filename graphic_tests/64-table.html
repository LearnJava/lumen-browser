<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #ff00ff; width: 1024px; height: 720px; margin: 0; }
        .__f { background: white; width: 1022px; height: 718px; margin: 1px; padding: 20px; overflow: hidden; }

        table {
            border-collapse: separate;
            border-spacing: 4px 2px;
            width: 100%;
            border: 2px solid #333;
            background: #f5f5f5;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #ddd;
            font-weight: bold;
        }

        tbody tr:nth-child(even) {
            background: #fff;
        }

        tbody tr:nth-child(odd) {
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="__f">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Alice</td>
                    <td>30</td>
                    <td>New York</td>
                </tr>
                <tr>
                    <td>Bob</td>
                    <td>25</td>
                    <td>London</td>
                </tr>
                <tr>
                    <td>Charlie</td>
                    <td>35</td>
                    <td>Paris</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
