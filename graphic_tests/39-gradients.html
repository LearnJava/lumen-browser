<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #ff00ff; width: 1024px; height: 720px; }
  .__f { background: #1a1a2e; width: 1022px; height: 718px; margin: 1px; padding: 20px; overflow: hidden; box-sizing: border-box; }

  .row { display: flex; gap: 16px; margin-bottom: 16px; }

  /* Linear gradients */
  .lg-to-right  { width: 180px; height: 80px; background: linear-gradient(to right, #e63946, #457b9d); }
  .lg-to-bottom { width: 180px; height: 80px; background: linear-gradient(to bottom, #2ec4b6, #ff9f1c); }
  .lg-45deg     { width: 180px; height: 80px; background: linear-gradient(45deg, #6a0dad, #ff6b6b); }
  .lg-3stops    { width: 180px; height: 80px; background: linear-gradient(to right, #f72585, #7209b7, #4cc9f0); }
  .lg-transparent { width: 180px; height: 80px; background: linear-gradient(to right, rgba(255,100,0,0.0), rgba(255,100,0,1.0)); }

  /* Radial gradients */
  .rg-center    { width: 180px; height: 120px; background: radial-gradient(circle, #a8edea, #fed6e3); }
  .rg-offset    { width: 180px; height: 120px; background: radial-gradient(circle at 25% 25%, #f9ca24, #6ab04c); }
  .rg-3stops    { width: 180px; height: 120px; background: radial-gradient(circle, #ff0000, #00ff00, #0000ff); }
  .rg-ellipse   { width: 240px; height: 120px; background: radial-gradient(ellipse at center, #fff9c4, #f06292); }

  /* Repeating gradients */
  .rep-linear   { width: 180px; height: 80px; background: repeating-linear-gradient(45deg, #333 0px, #333 10px, #666 10px, #666 20px); }
  .rep-radial   { width: 180px; height: 80px; background: repeating-radial-gradient(circle, #fff 0%, #fff 5%, #88c 5%, #88c 10%); }

  /* Stacked / overlay */
  .stacked      { width: 180px; height: 80px; background: linear-gradient(to right, #0f2027, #203a43, #2c5364); }
</style>
</head>
<body>
<div class="__f">
  <div class="row">
    <div class="lg-to-right"></div>
    <div class="lg-to-bottom"></div>
    <div class="lg-45deg"></div>
    <div class="lg-3stops"></div>
    <div class="lg-transparent"></div>
  </div>
  <div class="row">
    <div class="rg-center"></div>
    <div class="rg-offset"></div>
    <div class="rg-3stops"></div>
    <div class="rg-ellipse"></div>
  </div>
  <div class="row">
    <div class="rep-linear"></div>
    <div class="rep-radial"></div>
    <div class="stacked"></div>
  </div>
</div>
</body>
</html>
