<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lumen — 106 transform + z-index stacking interaction</title>
<style>
  /* Interaction test: transform (TEST-22) × z-index stacking (TEST-38).
     A transformed element creates a stacking context: its z-index children
     are trapped inside it, and the element itself participates at z:0. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ff00ff; width: 1024px; height: 720px; overflow: hidden; }
  .__f { background: #1a202c; width: 1022px; height: 718px; margin: 1px; overflow: hidden; position: relative; }

  .cell { position: absolute; width: 300px; height: 300px; }
  .c0 { left: 24px;  top: 24px; }
  .c1 { left: 364px; top: 24px; }
  .c2 { left: 704px; top: 24px; }
  .c3 { left: 24px;  top: 374px; }
  .c4 { left: 364px; top: 374px; }
  .c5 { left: 704px; top: 374px; }
</style>
</head>
<body>
<div class="__f">

  <!-- c0: negative-z child inside a TRANSFORMED parent paints behind the parent's
       content but in front of the parent's own background (context is atomic). -->
  <div class="cell c0">
    <div style="position:absolute;left:30px;top:30px;width:240px;height:240px;background:#2b6cb0;transform:rotate(8deg);">
      <div style="position:absolute;left:100px;top:100px;width:160px;height:160px;background:#ed8936;z-index:-1;"></div>
      <div style="position:absolute;left:20px;top:20px;width:140px;height:140px;background:#f6e05e;"></div>
    </div>
  </div>

  <!-- c1: transformed sibling (stacking context at z:0) vs positioned sibling
       with z-index:1 — the z:1 sibling paints on top despite DOM order. -->
  <div class="cell c1">
    <div style="position:absolute;left:120px;top:120px;width:170px;height:170px;background:#48bb78;z-index:1;"></div>
    <div style="position:absolute;left:20px;top:20px;width:170px;height:170px;background:#e53e3e;transform:translate(30px,30px);"></div>
  </div>

  <!-- c2: z-index:2 plain positioned sibling above a transformed z-index:1 sibling -->
  <div class="cell c2">
    <div style="position:absolute;left:20px;top:20px;width:180px;height:180px;background:#9f7aea;z-index:1;transform:rotate(12deg);"></div>
    <div style="position:absolute;left:110px;top:110px;width:170px;height:170px;background:#4fd1c5;z-index:2;"></div>
  </div>

  <!-- c3: z-index children INSIDE a rotated parent keep their relative order -->
  <div class="cell c3">
    <div style="position:absolute;left:30px;top:30px;width:240px;height:240px;background:#2d3748;transform:rotate(-10deg);">
      <div style="position:absolute;left:30px;top:30px;width:140px;height:140px;background:#2b6cb0;z-index:1;"></div>
      <div style="position:absolute;left:90px;top:90px;width:140px;height:140px;background:#e53e3e;z-index:2;"></div>
    </div>
  </div>

  <!-- c4: scaled parent with overlapping z children — order preserved under scale -->
  <div class="cell c4">
    <div style="position:absolute;left:60px;top:60px;width:180px;height:180px;background:#2d3748;transform:scale(1.5);">
      <div style="position:absolute;left:20px;top:20px;width:100px;height:100px;background:#f6e05e;z-index:2;"></div>
      <div style="position:absolute;left:60px;top:60px;width:100px;height:100px;background:#38a169;z-index:1;"></div>
    </div>
  </div>

  <!-- c5: CONTROL — same z children as c3 without parent transform -->
  <div class="cell c5">
    <div style="position:absolute;left:30px;top:30px;width:240px;height:240px;background:#2d3748;">
      <div style="position:absolute;left:30px;top:30px;width:140px;height:140px;background:#2b6cb0;z-index:1;"></div>
      <div style="position:absolute;left:90px;top:90px;width:140px;height:140px;background:#e53e3e;z-index:2;"></div>
    </div>
  </div>

</div>
</body>
</html>
