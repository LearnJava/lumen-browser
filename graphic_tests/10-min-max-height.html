<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Lumen — 10 min-max-height</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a202c; width: 1024px; height: 720px; padding: 24px; }
    /* Each pair: ref column (gray) + constrained column (green), side by side */
    .pair { display: inline-block; margin: 0 40px 24px 0; vertical-align: bottom; }
    .ref  { display: inline-block; width: 60px; background: #718096; margin-right: 8px; vertical-align: bottom; }
    .test { display: inline-block; width: 60px; background: #38a169; vertical-align: bottom; }
  </style>
</head>
<body>
  <!-- height:40px min-height:100px → 100px, matches ref 100px -->
  <div class="pair">
    <div class="ref"  style="height: 100px;"></div>
    <div class="test" style="height: 40px; min-height: 100px;"></div>
  </div>

  <!-- height:160px max-height:80px → 80px, matches ref 80px -->
  <div class="pair">
    <div class="ref"  style="height: 80px;"></div>
    <div class="test" style="height: 160px; max-height: 80px;"></div>
  </div>

  <!-- min-height:120px max-height:60px (min>max → min wins = 120), matches ref 120px -->
  <div class="pair">
    <div class="ref"  style="height: 120px;"></div>
    <div class="test" style="height: 40px; min-height: 120px; max-height: 60px;"></div>
  </div>

  <!-- height:80px (no constraints) baseline -->
  <div class="pair">
    <div class="ref"  style="height: 80px;"></div>
    <div class="test" style="height: 80px;"></div>
  </div>

  <!-- height:60px min-height:60px (no change expected) -->
  <div class="pair">
    <div class="ref"  style="height: 60px;"></div>
    <div class="test" style="height: 60px; min-height: 60px;"></div>
  </div>

  <!-- height:200px max-height:200px (no change expected) -->
  <div class="pair">
    <div class="ref"  style="height: 140px;"></div>
    <div class="test" style="height: 200px; max-height: 140px;"></div>
  </div>
</body>
</html>
